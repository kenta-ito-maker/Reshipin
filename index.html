// ─── SUPABASE ─────────────────────────────────────────────────────────────────

const getUserId = () => {
  let uid = localStorage.getItem("rsp_uid");
  if (!uid) { uid = "user_" + Math.random().toString(36).slice(2) + Date.now(); localStorage.setItem("rsp_uid", uid); }
  return uid;
};

const sbFetch = async (path, options = {}) => {
  const res = await fetch(path, { headers: {"Content-Type":"application/json"}, ...options });
  return res.json();
};

const loadInventory = async () => {
  try {
    const uid = getUserId();
    const data = await sbFetch(`/api/inventory?user_id=${uid}`);
    return Array.isArray(data) ? data.map(i => ({...i, id: i.id})) : [];
  } catch { return []; }
};

const saveItem = async (item) => {
  const uid = getUserId();
  try {
    const data = await sbFetch("/api/inventory", {
      method: "POST",
      body: JSON.stringify({user_id: uid, name: item.name, expiry: item.expiry || null, category: item.category || "冷蔵"}),
    });
    return Array.isArray(data) ? data[0] : data;
  } catch { return null; }
};

const deleteItem = async (id) => {
  try { await sbFetch(`/api/inventory?id=${id}`, {method:"DELETE"}); } catch {}
};

const updateItemDb = async (id, fields) => {
  try { await sbFetch(`/api/inventory?id=${id}`, {method:"PATCH", body: JSON.stringify(fields)}); } catch {}
};

// ─── ポイント ─────────────────────────────────────────────────────────────────

const loadPoints = async () => {
  try {
    const uid = getUserId();
    const data = await sbFetch(`/api/points?user_id=${uid}`);
    if (data && typeof data.balance === "number") return data.balance;
    return 0;
  } catch { return 0; }
};

const addPoints = async (amount) => {
  try {
    const uid = getUserId();
    const data = await sbFetch("/api/points", {
      method: "POST",
      body: JSON.stringify({user_id: uid, amount}),
    });
    if (data && typeof data.balance === "number") return data.balance;
    return null;
  } catch { return null; }
};

// ─── 引き継ぎコード ───────────────────────────────────────────────────────────

const generateTransferCode = () => {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // 紛らわしい文字(I,O,0,1)を除外
  const block = () => Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join("");
  return `RCP-${block()}-${block()}`;
};

const issueTransferCode = async () => {
  const uid = getUserId();
  for (let i = 0; i < 5; i++) { // 万一衝突した場合のリトライ
    const code = generateTransferCode();
    try {
      const data = await sbFetch("/api/transfer", {
        method: "POST",
        body: JSON.stringify({code, user_id: uid}),
      });
      if (data && data.code) return data.code;
    } catch {}
  }
  return null;
};

const redeemTransferCode = async (code) => {
  try {
    const normalized = code.trim().toUpperCase();
    const data = await sbFetch(`/api/transfer?code=${encodeURIComponent(normalized)}`);
    if (data && data.user_id) return data.user_id;
    return null;
  } catch { return null; }
};

const RANKS = [
  { name: "ブロンズ",       icon: "🥉", min: 0,    next: 50 },
  { name: "シルバー",       icon: "🥈", min: 50,   next: 200 },
  { name: "ゴールド",       icon: "🥇", min: 200,  next: 500 },
  { name: "ダイヤモンド",   icon: "💎", min: 500,  next: 1500 },
  { name: "マスターシェフ", icon: "👑", min: 1500, next: null },
];
const getRank = (pts) => {
  for (let i = RANKS.length - 1; i >= 0; i--) {
    if (pts >= RANKS[i].min) return RANKS[i];
  }
  return RANKS[0];
};

const callClaude = async (system, messages) => {
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-haiku-4-5", max_tokens: 2000, system, messages }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.find(b => b.type === "text")?.text || "";
};

const toBase64 = (file) => new Promise((res, rej) => {
  const r = new FileReader();
  r.onload = e => res(e.target.result.split(",")[1]);
  r.onerror = rej;
  r.readAsDataURL(file);
});

const today = () => new Date().toISOString().split("T")[0];
const daysUntil = (d) => { if (!d) return null; return Math.ceil((new Date(d) - new Date()) / 86400000); };
const expiryColor = (d) => { const n = daysUntil(d); if (n===null) return "#c0ac98"; if (n<=1) return "#d6524e"; if (n<=3) return "#d67850"; return "#78aa6e"; };
const expiryLabel = (d) => { const n = daysUntil(d); if (n===null) return ""; if (n<=0) return "⚠️ 期限切れ"; if (n<=3) return `⚠️ あと${n}日`; return `期限：${d}`; };

const EXPIRY_OPTIONS = [
  { label: "今日中", days: 0 },
  { label: "2〜3日", days: 3 },
  { label: "1週間", days: 7 },
  { label: "1ヶ月以上", days: 30 },
  { label: "設定しない", days: null },
];
const addDays = (n) => { if (n===null) return null; const d = new Date(); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };
const expiryOptionLabel = (expiry) => { const n = daysUntil(expiry); if (n===null) return "設定しない"; if (n<=1) return "今日中"; if (n<=4) return "2〜3日"; if (n<=8) return "1週間"; return "1ヶ月以上"; };

const ExpiryPicker = ({ value, onChange }) => {
  const current = expiryOptionLabel(value);
  return (
    <div>
      <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>だいたいいつまで使えますか？</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:6}}>
        {EXPIRY_OPTIONS.map(opt => {
          const selected = current === opt.label;
          return (
            <button key={opt.label}
              style={{background:selected?"#e08c3a":"#faf0e6",border:`1.5px solid ${selected?"#e08c3a":"#f0d8b8"}`,borderRadius:20,padding:"4px 12px",fontSize:12,color:selected?"#fff":"#888",cursor:"pointer",fontFamily:"inherit"}}
              onClick={() => onChange(addDays(opt.days))}>
              {opt.label}
            </button>
          );
        })}
      </div>
      <input type="date" value={value||""} onChange={e => onChange(e.target.value||null)}
        style={{background:"#fff",border:"1.5px solid #f0e0c8",borderRadius:8,color:"#555",fontSize:12,padding:"6px 10px",fontFamily:"inherit",outline:"none",width:"100%"}}/>
    </div>
  );
};

const RecipeCard = ({ title, badge, time, calories, content, onCooked }) => {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{background:"#fffcf7",borderRadius:24,boxShadow:"0 2px 14px rgba(160,120,80,0.08)",border:"1.5px solid #f0e0c8",marginBottom:14,overflow:"hidden"}}>
      <div style={{padding:"18px 20px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}} onClick={() => setOpen(o => !o)}>
        <div style={{flex:1}}>
          <div style={{fontSize:16,fontWeight:700,color:"#5a4a3a",marginBottom:6,fontFamily:"'Kaisei Decol',serif"}}>{title}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {badge && <span style={{fontSize:11,background:"#fdecd8",color:"#d67850",borderRadius:20,padding:"3px 12px",fontWeight:600}}>{badge}</span>}
            {time && <span style={{fontSize:11,background:"#fdf4e8",color:"#8a7563",borderRadius:20,padding:"3px 12px",fontWeight:600}}>⏱ {time}</span>}
            {calories && <span style={{fontSize:11,background:"#fff5ea",color:"#c56640",borderRadius:20,padding:"3px 12px",fontWeight:600}}>🔥 {calories}</span>}
          </div>
        </div>
        <div style={{fontSize:20,color:"#d67850",marginLeft:12}}>{open ? "▲" : "▼"}</div>
      </div>
      {open && (
        <div style={{padding:"0 20px 20px",borderTop:"1.5px dashed #f0e0c8"}}>
          <div style={{fontSize:13,color:"#5a4a3a",lineHeight:2.1,whiteSpace:"pre-wrap",marginTop:16}}>{content.replace(/【[①②③].+?\n/,"").trim()}</div>
          <button
            onClick={(e) => { e.stopPropagation(); onCooked && onCooked(); }}
            style={{marginTop:16,background:"#78aa6e",color:"#fff",border:"none",borderRadius:14,padding:"12px 0",fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer",width:"100%",boxShadow:"0 3px 10px rgba(120,170,110,0.25)"}}>
            🍳 これ作った！（在庫を減らす）
          </button>
        </div>
      )}
    </div>
  );
};

function App() {
  const load = (key, fb) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch { return fb; } };
  const [inventory, setInvRaw] = useState([]);
  const [invLoading, setInvLoading] = useState(true);
  const [people, setPplRaw] = useState(() => load("rsp_ppl", 2));
  const [familyNote, setFamRaw] = useState(() => load("rsp_fam", ""));
  const [screen, setScreen] = useState("loading");
  const [points, setPoints] = useState(0);
  const [pointToast, setPointToast] = useState(null); // {amount, reason}
  const [transferModal, setTransferModal] = useState(null); // "issue" | "redeem" | null
  const [issuedCode, setIssuedCode] = useState(null);
  const [issuingCode, setIssuingCode] = useState(false);
  const [redeemInput, setRedeemInput] = useState("");
  const [redeemError, setRedeemError] = useState("");
  const [redeeming, setRedeeming] = useState(false);

  useEffect(() => {
    loadInventory().then(data => {
      setInvRaw(data);
      setInvLoading(false);
      setScreen("home");
    });
    loadPoints().then(setPoints);
  }, []);

  const awardPoints = async (amount, reason) => {
    const newBalance = await addPoints(amount);
    if (newBalance !== null) {
      const prevRank = getRank(points);
      const newRank = getRank(newBalance);
      setPoints(newBalance);
      setPointToast({amount, reason, rankUp: prevRank.name !== newRank.name ? newRank : null});
      setTimeout(() => setPointToast(null), 3500);
    }
  };

  const handleIssueCode = async () => {
    setIssuingCode(true);
    const code = await issueTransferCode();
    setIssuingCode(false);
    if (code) setIssuedCode(code);
    else setIssuedCode("ERROR");
  };

  const handleRedeemCode = async () => {
    const code = redeemInput.trim().toUpperCase();
    if (!code) { setRedeemError("コードを入力してください"); return; }
    setRedeeming(true);
    setRedeemError("");
    const newUid = await redeemTransferCode(code);
    setRedeeming(false);
    if (!newUid) { setRedeemError("コードが見つかりません。もう一度確認してください。"); return; }
    // 新しいuidをlocalStorageに書き込んでリロード
    localStorage.setItem("rsp_uid", newUid);
    location.reload();
  };

  const setInventory = async (v) => {
    const n = typeof v==="function"?v(inventory):v;
    setInvRaw(n);
  };

  const addToInventory = async (items) => {
    const saved = await Promise.all(items.map(i => saveItem(i)));
    const valid = saved.filter(Boolean);
    setInvRaw(prev => [...prev, ...valid]);
  };

  const removeFromInventory = async (id) => {
    await deleteItem(id);
    setInvRaw(prev => prev.filter(i => i.id !== id));
  };

  const updateInInventory = async (id, field, value) => {
    await updateItemDb(id, {[field]: value});
    setInvRaw(prev => prev.map(i => i.id===id?{...i,[field]:value}:i));
  };

  const setPeople = v => { const n = typeof v==="function"?v(people):v; setPplRaw(n); try{localStorage.setItem("rsp_ppl",JSON.stringify(n));}catch{} };
  const setKondateMode = v => { setKondateModeRaw(v); try{localStorage.setItem("rsp_kondate_mode",JSON.stringify(v));}catch{} };
  const setFamilyNote = v => { setFamRaw(v); try{localStorage.setItem("rsp_fam",JSON.stringify(v));}catch{} };

  const [fridgeImages, setFridgeImages] = useState([]);
  const [fridgeLoading, setFridgeLoading] = useState(false);
  const [fridgePreview, setFridgePreview] = useState(null);
  const fridgeRef = useRef();

  const [shopImage, setShopImage] = useState(null);
  const [shopB64, setShopB64] = useState(null);
  const [shopText, setShopText] = useState("");
  const [extras, setExtras] = useState("");
  const [kondateMode, setKondateModeRaw] = useState(() => load("rsp_kondate_mode", "set")); // "set" | "single"
  const [result, setResult] = useState(null);
  const [resultLoading, setResultLoading] = useState(false);
  const shopRef = useRef();

  const [updateMode, setUpdateMode] = useState(null);
  const [updateImage, setUpdateImage] = useState(null);
  const [updateLoading, setUpdateLoading] = useState(false);
  const [updatePreview, setUpdatePreview] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [categoryTab, setCategoryTab] = useState("すべて");
  const [consumeModal, setConsumeModal] = useState(null); // {loading, items: [{id,name,used,remain}]}
  const receiptRef = useRef();
  const updateFridgeRef = useRef();
  const singleRef = useRef();

  const openConsume = async (recipeContent) => {
    setConsumeModal({loading: true, items: null});
    try {
      const raw = await callClaude(PROMPT_CONSUME(recipeContent, inventory, people), [{role:"user",content:[{type:"text",text:"使用食材を予測してください。"}]}]);
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setConsumeModal({loading: false, items: Array.isArray(parsed) ? parsed : []});
    } catch(e) {
      setConsumeModal({loading: false, items: [], error: "予測に失敗しました"});
    }
  };

  const confirmConsume = async () => {
    if (!consumeModal?.items) return;
    for (const it of consumeModal.items) {
      if (it.remain === "全部使った") {
        await deleteItem(it.id);
      } else {
        const noteMap = {"少し残った":"少し","半分残った":"半分","ほぼ残ってる":""};
        const note = noteMap[it.remain];
        if (note) await updateItemDb(it.id, {note});
      }
    }
    const freshInv = await loadInventory();
    setInvRaw(freshInv);
    setConsumeModal(null);
    awardPoints(10, "賢く使い切ったね！");
  };

  const handleFridgeScan = async (e) => {
    const files = Array.from(e.target.files); if (!files.length) return;
    setFridgeLoading(true);
    try {
      const newImgs = await Promise.all(files.map(async f => ({ url: URL.createObjectURL(f), b64: await toBase64(f) })));
      const allImgs = [...fridgeImages, ...newImgs];
      setFridgeImages(allImgs);
      const content = [
        ...allImgs.map(img => ({ type:"image", source:{type:"base64",media_type:"image/jpeg",data:img.b64} })),
        { type:"text", text:`今日は${today()}です。冷蔵庫の食材を全て読み取ってください。` },
      ];
      const raw = await callClaude(PROMPT_FRIDGE_SCAN, [{role:"user",content}]);
      setFridgePreview(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    } catch(e) { setFridgePreview([]); }
    setFridgeLoading(false);
  };

  const confirmFridge = async () => {
    const valid = fridgePreview.filter(i => i.name?.trim());
    await addToInventory(valid);
    setFridgeImages([]);
    setScreen("home");
    if (valid.length > 0) awardPoints(1, "食材の登録ありがとう〜");
  };

  const analyze = async (mode) => {
    setResultLoading(true);
    try {
      const isFridgeOnly = mode === "fridge";
      const promptFn = kondateMode === "set" ? PROMPT_KONDATE_SET : PROMPT_KONDATE_SINGLE;
      const sysPrompt = isFridgeOnly
        ? promptFn(inventory, "※在庫にある食材だけで作れる献立を提案してください。買い物不要のものだけ。", people, familyNote, extras)
        : promptFn(inventory, shopText || "特売・値引き情報なし", people, familyNote, extras);
      const userText = kondateMode === "set"
        ? (isFridgeOnly ? "在庫にある食材で作れる「主菜＋副菜＋汁物」の献立セットを3案提案してください。" : "在庫と特売情報から「主菜＋副菜＋汁物」の献立セットを3案提案してください。")
        : (isFridgeOnly ? "在庫にある食材だけで1品料理を3つ提案してください。" : "在庫と特売情報から1品料理を3つ提案してください。");
      const content = !isFridgeOnly && shopB64
        ? [{type:"image",source:{type:"base64",media_type:"image/jpeg",data:shopB64}},{type:"text",text:`チラシ写真。補足：${shopText||"なし"}\n\n${userText}`}]
        : [{type:"text",text:userText}];
      const text = await callClaude(sysPrompt, [{role:"user",content}]);
      setResult(text);
      setScreen("result");
    } catch(err) { setResult("エラー："+err.message); setScreen("result"); }
    setResultLoading(false);
  };

  const handleUpdateScan = async (e, type) => {
    const f = e.target.files[0]; if (!f) return;
    setUpdateImage(URL.createObjectURL(f));
    setUpdateLoading(true);
    try {
      const b64 = await toBase64(f);
      const prompt = type==="receipt"?PROMPT_RECEIPT:type==="single"?PROMPT_SINGLE:PROMPT_FRIDGE_SCAN;
      const raw = await callClaude(prompt, [{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
        {type:"text",text:`今日は${today()}です。読み取ってください。`},
      ]}]);
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setUpdatePreview(Array.isArray(parsed)?parsed:[parsed]);
    } catch { setUpdatePreview([]); }
    setUpdateLoading(false);
  };

  const confirmUpdate = async () => {
    const valid = updatePreview.filter(i => i.name?.trim());
    await addToInventory(valid);
    const mode = updateMode;
    setUpdatePreview(null); setUpdateImage(null); setUpdateMode(null);
    if (valid.length === 0) return;
    if (mode === "receipt") awardPoints(10, "お買い物お疲れ様〜✨");
    else awardPoints(1, "食材の登録ありがとう〜");
  };

  const removeItem = id => removeFromInventory(id);
  const updateItem = (id,f,v) => updateInInventory(id,f,v);
  const updatePreviewItem = (idx,f,v) => setUpdatePreview(p => p.map((it,i) => i===idx?{...it,[f]:v}:it));

  const TabBar = () => (
    <div style={S.tabBar}>
      {[{key:"home",icon:"🍳",label:"献立"},{key:"update",icon:"🧺",label:"在庫"},{key:"settings",icon:"⚙️",label:"設定"}].map(t => (
        <button key={t.key}
          style={{...S.tab,...(screen===t.key||(screen==="result"&&t.key==="home")?S.tabActive:{})}}
          onClick={() => { setScreen(t.key); if(t.key==="home") setResult(null); }}>
          <div style={S.tabIcon}>{t.icon}</div>
          <div>{t.label}</div>
        </button>
      ))}
    </div>
  );


  if (screen==="loading") return (
    <div style={{...S.root, justifyContent:"center", alignItems:"center", gap:16}}>
      <div style={{fontSize:36}}>🍽️</div>
      <div style={{color:"#e08c3a", fontSize:16, fontWeight:700}}>レシピン</div>
      <div style={S.spinnerOrange} className="spin"/>
    </div>
  );

  return (
    <div style={S.root}>
      <div style={S.appHeader}><div style={S.logoSmall}>🍽️ レシピン</div></div>
      <div style={S.appContent}>

        {screen==="home" && (
          <div className="fade-in">
            {(() => {
              const h = new Date().getHours();
              const greet = h < 10 ? "おはよう〜☀️" : h < 15 ? "こんにちは〜🍳" : h < 18 ? "お疲れ様〜🌇" : "今夜もおつかれさま〜🌙";
              const sub = h < 10 ? "今日も素敵な一日にしましょう" : h < 15 ? "お昼ごはん、なに食べよっか" : h < 18 ? "今日の晩ごはん、決めちゃお" : "ほっとひと息、献立考えよっか";
              return (
                <>
                  <div style={S.greeting}>{greet}</div>
                  <div style={S.greetingSub}>{sub}</div>
                </>
              );
            })()}
            <div style={S.peopleCard}>
              <div style={S.peopleLabel}>🍽️ 今日の人数</div>
              <div style={S.peopleRow}>
                <button style={S.peopleBtn} onClick={() => setPeople(p => Math.max(1,p-1))}>－</button>
                <div style={S.peopleNum}>{people}<span style={S.peopleUnit}>人分</span></div>
                <button style={S.peopleBtn} onClick={() => setPeople(p => p+1)}>＋</button>
              </div>
            </div>
            {inventory.length === 0 && (
              <div style={{background:"linear-gradient(135deg,#fff5ea 0%,#fdf4e8 100%)",border:"1.5px solid #f0d8b8",borderRadius:24,padding:"22px 22px",marginBottom:16,boxShadow:"0 2px 14px rgba(214,120,80,0.08)"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#d67850",marginBottom:16,letterSpacing:"0.15em"}}>✨ はじめましての方へ</div>
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{background:"#d67850",color:"#fff",width:28,height:28,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0,boxShadow:"0 2px 6px rgba(214,120,80,0.25)"}}>1</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#5a4a3a"}}>🥕 お買い物したら撮るだけ</div>
                      <div style={{fontSize:11,color:"#8a7563",marginTop:3,lineHeight:1.6}}>冷蔵庫やレシートを撮影するだけでOK</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{background:"#d67850",color:"#fff",width:28,height:28,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0,boxShadow:"0 2px 6px rgba(214,120,80,0.25)"}}>2</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#5a4a3a"}}>🍳 今日の献立、まかせて</div>
                      <div style={{fontSize:11,color:"#8a7563",marginTop:3,lineHeight:1.6}}>ある食材でぴったりの献立を提案</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{background:"#d67850",color:"#fff",width:28,height:28,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0,boxShadow:"0 2px 6px rgba(214,120,80,0.25)"}}>3</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#5a4a3a"}}>✨ ポイントも貯まっちゃう</div>
                      <div style={{fontSize:11,color:"#8a7563",marginTop:3,lineHeight:1.6}}>使えば使うほどちょっといいことが…♪</div>
                    </div>
                  </div>
                </div>
                <button
                  style={{...S.mainBtn,marginTop:20,marginBottom:0,width:"100%"}}
                  onClick={() => setScreen("update")}
                  className="main-btn">
                  🥕 まずは食材を登録してみる
                </button>
              </div>
            )}
            <div style={S.sectionTitle}>🧺 冷蔵庫の中身</div>
            <div style={S.inventoryCard} onClick={() => setScreen("update")}>
              {inventory.length===0
                ? <div style={S.inventoryEmpty}>まだからっぽだよ〜<br/><span style={{fontSize:12,color:"#c0ac98"}}>タップして食材を入れよう</span></div>
                : <>

            })()}
            <div style={{background:"#fffcf7",border:"1.5px solid #f0e0c8",borderRadius:20,padding:"18px 20px",marginBottom:14,boxShadow:"0 2px 10px rgba(160,120,80,0.05)"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#5a4a3a",marginBottom:4,letterSpacing:"0.08em"}}>📦 データの引き継ぎ</div>
              <div style={{fontSize:11,color:"#8a7563",marginBottom:14,lineHeight:1.6}}>機種変更しても大丈夫！コードで在庫もポイントも連れて行けるよ〜</div>
              <div style={{display:"flex",gap:10}}>
                <button
                  onClick={() => { setIssuedCode(null); setTransferModal("issue"); }}
                  style={{flex:1,background:"#fdf4e8",border:"1.5px solid #e8c8a8",borderRadius:14,padding:"11px 8px",fontSize:12,fontWeight:700,color:"#c56640",cursor:"pointer",fontFamily:"inherit"}}>
                  🔑 コードを発行
                </button>
                <button
                  onClick={() => { setRedeemInput(""); setRedeemError(""); setTransferModal("redeem"); }}
                  style={{flex:1,background:"#fdf4e8",border:"1.5px solid #e8c8a8",borderRadius:14,padding:"11px 8px",fontSize:12,fontWeight:700,color:"#c56640",cursor:"pointer",fontFamily:"inherit"}}>
                  📥 コードを入力
                </button>
              </div>
            </div>
            <div style={S.settingCard}>
              <div style={S.settingLabel}>🍽️ デフォルトの人数</div>
              <div style={S.peopleRow}>
                <button style={S.peopleBtn} onClick={() => setPeople(p => Math.max(1,p-1))}>－</button>
                <div style={S.peopleNum}>{people}<span style={S.peopleUnit}>人分</span></div>
                <button style={S.peopleBtn} onClick={() => setPeople(p => p+1)}>＋</button>
              </div>
            </div>
            <div style={S.settingCard}>
              <div style={S.settingLabel}>📝 家族構成・食の好み</div>
              <textarea style={S.warmTextarea} placeholder={"例：大人2人・子ども1人（5歳）。辛いものはNG。魚料理が好き。"} value={familyNote} onChange={e => setFamilyNote(e.target.value)} rows={4}/>
              <div style={{color:"#aaa",fontSize:11,marginTop:-8}}>献立を提案するときに自動で考慮します</div>
            </div>
            <button style={{...S.mainBtn,background:"#f0ebe3",color:"#c0392b",marginTop:8}} onClick={() => { setInvRaw([]); setScreen("update"); }}>
              最初からやり直す（在庫をリセット）
            </button>
          </div>
        )}

      </div>
      {consumeModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(90,74,58,0.4)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}} onClick={() => !consumeModal.loading && setConsumeModal(null)}>
          <div style={{width:"100%",maxWidth:480,background:"#fffcf7",borderRadius:"28px 28px 0 0",padding:"24px 22px 110px",maxHeight:"80vh",overflowY:"auto"}} onClick={e => e.stopPropagation()}>
            <div style={{fontSize:18,fontWeight:700,color:"#5a4a3a",marginBottom:4}}>🍳 お料理おつかれさま〜</div>
            <div style={{fontSize:13,color:"#8a7563",marginBottom:16}}>どの食材を使ったか、確認してね</div>
            {consumeModal.loading ? (
              <div style={S.loadingRow}><div style={S.spinnerOrange} className="spin"/><span style={{color:"#d67850",fontSize:13}}>使った分を予測中…🧐</span></div>
            ) : (
              <>
                {consumeModal.items?.length === 0 && (
                  <div style={{color:"#8a7563",fontSize:13,textAlign:"center",padding:"12px 0 8px",lineHeight:1.7}}>
                    うーん、在庫から使った食材を見つけられなかったみたい。
                    <br/>手動で追加してね〜
                  </div>
                )}
                <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:12}}>
                  {consumeModal.items.map((it,idx) => (
                    <div key={idx} style={{background:"#faf8f4",borderRadius:12,padding:"12px 14px",position:"relative"}}>
                      <button
                        onClick={() => setConsumeModal(m => ({...m, items: m.items.filter((_,i) => i!==idx)}))}
                        style={{position:"absolute",top:8,right:10,background:"none",border:"none",color:"#bbb",fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
                      <div style={{fontSize:14,fontWeight:700,color:"#333",marginBottom:2}}>{it.name}</div>
                      <div style={{fontSize:11,color:"#aaa",marginBottom:8}}>{it.manual ? "手動で追加" : `AI予測：${it.used}`}</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {["全部使った","少し残った","半分残った","ほぼ残ってる"].map(opt => {
                          const selected = it.remain === opt;
                          return (
                            <button key={opt}
                              style={{background:selected?"#e08c3a":"#fff",border:`1.5px solid ${selected?"#e08c3a":"#f0d8b8"}`,borderRadius:20,padding:"4px 12px",fontSize:11,color:selected?"#fff":"#888",cursor:"pointer",fontFamily:"inherit"}}
                              onClick={() => setConsumeModal(m => ({...m, items: m.items.map((x,i) => i===idx?{...x,remain:opt}:x)}))}>
                              {opt}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
                {(() => {
                  const usedIds = new Set((consumeModal.items||[]).map(x => x.id));
                  const remaining = inventory.filter(i => !usedIds.has(i.id));
                  if (remaining.length === 0) return null;
                  return (
                    <div style={{marginBottom:20}}>
                      <div style={{fontSize:12,color:"#888",marginBottom:6}}>＋ 他に使った食材を追加</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {remaining.map(item => (
                          <button key={item.id}
                            onClick={() => setConsumeModal(m => ({...m, items: [...(m.items||[]), {id: item.id, name: item.name, used: "", remain: "ほぼ残ってる", manual: true}]}))}
                            style={{background:"#fff",border:"1.5px dashed #f0d8b8",borderRadius:20,padding:"5px 12px",fontSize:12,color:"#888",cursor:"pointer",fontFamily:"inherit"}}>
                            + {CATEGORY_ICONS[item.category||"冷蔵"]} {item.name}
                          </button>
                        ))}
                      </div>
                    </div>
                  );
                })()}
                <button style={S.mainBtn} onClick={confirmConsume} className="main-btn">
                  {(consumeModal.items||[]).length === 0 ? "そのまま閉じる" : "在庫を更新する"}
                </button>
                <button style={S.skipLink} onClick={() => setConsumeModal(null)}>キャンセル</button>
              </>
            )}
          </div>
        </div>
      )}
      {pointToast && (
        <div className="bounce-in" style={{position:"fixed",top:24,left:"50%",transform:"translateX(-50%)",zIndex:300,background:"#fffcf7",border:"2px solid #f0d8b8",borderRadius:22,padding:"14px 22px",boxShadow:"0 6px 24px rgba(214,120,80,0.25)",display:"flex",flexDirection:"column",alignItems:"center",gap:4,maxWidth:"calc(100% - 40px)"}}>
          <div style={{fontSize:14,fontWeight:700,color:"#d67850"}}>✨ +{pointToast.amount}pt 貯まったよ！</div>
          <div style={{fontSize:11,color:"#8a7563"}}>{pointToast.reason}</div>
          {pointToast.rankUp && (
            <div style={{fontSize:12,fontWeight:700,color:"#b8860b",marginTop:6,background:"#fff5ea",padding:"5px 14px",borderRadius:20,border:"1.5px solid #f0d8b8"}}>
              🎉 {pointToast.rankUp.icon} {pointToast.rankUp.name} にランクアップ！
            </div>
          )}
        </div>
      )}
      {transferModal === "issue" && (
        <div style={{position:"fixed",inset:0,background:"rgba(90,74,58,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:250,padding:20}} onClick={() => setTransferModal(null)}>
          <div style={{width:"100%",maxWidth:400,background:"#fffcf7",borderRadius:24,padding:"24px 22px"}} onClick={e => e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:700,color:"#5a4a3a",marginBottom:4}}>🔑 引き継ぎコード発行</div>
            <div style={{fontSize:12,color:"#8a7563",marginBottom:16,lineHeight:1.7}}>新しい端末でこのコードを入力すると、今のデータがそのままお引越しできるよ〜</div>
            {!issuedCode && (
              <button
                onClick={handleIssueCode}
                disabled={issuingCode}
                style={{...S.mainBtn,background:issuingCode?"#ddd":"#e08c3a",color:"#fff",width:"100%"}}>
                {issuingCode ? "発行中..." : "コードを発行する"}
              </button>
            )}
            {issuedCode && issuedCode !== "ERROR" && (
              <>
                <div style={{background:"#faf5ec",border:"2px dashed #e08c3a",borderRadius:12,padding:"18px 12px",textAlign:"center",marginBottom:14}}>
                  <div style={{fontSize:22,fontWeight:700,color:"#333",letterSpacing:"0.05em",fontFamily:"monospace"}}>{issuedCode}</div>
                </div>
                <button
                  onClick={() => { navigator.clipboard?.writeText(issuedCode); }}
                  style={{width:"100%",background:"#faf5ec",border:"1.5px solid #e8d8c0",borderRadius:10,padding:"10px",fontSize:13,fontWeight:700,color:"#7a5a3a",cursor:"pointer",fontFamily:"inherit",marginBottom:10}}>
                  📋 コピー
                </button>
                <div style={{fontSize:11,color:"#c0392b",lineHeight:1.6,background:"#fff5f5",padding:"10px 12px",borderRadius:8}}>
                  ⚠️ このコードは大切に保管してください。メモ・スクショ推奨。紛失すると復旧できません。
                </div>
              </>
            )}
            {issuedCode === "ERROR" && (
              <div style={{color:"#c0392b",fontSize:13,textAlign:"center",padding:"12px 0"}}>発行に失敗しました。もう一度お試しください。</div>
            )}
            <button
              onClick={() => setTransferModal(null)}
              style={{width:"100%",background:"none",border:"none",color:"#888",fontSize:13,padding:"12px 0 0",cursor:"pointer",fontFamily:"inherit"}}>
              閉じる
            </button>
          </div>
        </div>
      )}
      {transferModal === "redeem" && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:250,padding:20}} onClick={() => !redeeming && setTransferModal(null)}>
          <div style={{width:"100%",maxWidth:400,background:"#fff",borderRadius:20,padding:"24px 22px"}} onClick={e => e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:700,color:"#333",marginBottom:4}}>📥 引き継ぎコード入力</div>
            <div style={{fontSize:12,color:"#888",marginBottom:16,lineHeight:1.6}}>前の端末で発行したコードを入力してください。</div>
            <input
              type="text"
              value={redeemInput}
              onChange={e => setRedeemInput(e.target.value)}
              placeholder="RCP-XXXX-XXXX"
              style={{width:"100%",boxSizing:"border-box",padding:"12px 14px",border:"1.5px solid #e8d8c0",borderRadius:10,fontSize:16,fontFamily:"monospace",letterSpacing:"0.05em",textAlign:"center",marginBottom:10,textTransform:"uppercase"}}
              disabled={redeeming}
            />
            {redeemError && <div style={{color:"#c0392b",fontSize:12,marginBottom:10,textAlign:"center"}}>{redeemError}</div>}
            <div style={{fontSize:11,color:"#c0392b",lineHeight:1.6,background:"#fff5f5",padding:"10px 12px",borderRadius:8,marginBottom:14}}>
              ⚠️ この端末の現在のデータ（在庫・ポイント）は消えて、引き継ぎ先のデータに置き換わります。
            </div>
            <button
              onClick={handleRedeemCode}
              disabled={redeeming}
              style={{...S.mainBtn,background:redeeming?"#ddd":"#e08c3a",color:"#fff",width:"100%",marginBottom:8}}>
              {redeeming ? "引き継ぎ中..." : "引き継ぐ"}
            </button>
            <button
              onClick={() => setTransferModal(null)}
              disabled={redeeming}
              style={{width:"100%",background:"none",border:"none",color:"#888",fontSize:13,padding:"8px 0 0",cursor:"pointer",fontFamily:"inherit"}}>
              キャンセル
            </button>
          </div>
        </div>
      )}
      <TabBar/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
