// ─── SOUND ───────────────────────────────────────────────────────────────────

const SFX = (() => {
  let ctx = null;
  let sizzleNodes = null; // {source, gain} for looping sizzle
  let unlocked = false;
  // Silent audio element for iOS PWA unlock
  const silentAudio = document.createElement("audio");
  silentAudio.setAttribute("playsinline",""); silentAudio.src = "data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA/+MYxAAAAAANIAAAAAExBTUUzLjEwMFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV";

  const init = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    // iOS PWA unlock: play silent audio + resume context
    if (!unlocked) {
      unlocked = true;
      silentAudio.play().catch(()=>{});
      silentAudio.pause();
      silentAudio.currentTime = 0;
    }
  };
  const enabled = () => { try { return localStorage.getItem("repi_sound_enabled") !== "false"; } catch { return true; } };
  const play = (fn) => { if (!enabled() || !ctx) return; try { if (ctx.state === "suspended") ctx.resume(); fn(ctx); } catch {} };

  return {
    init,
    tap: () => play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = "sine"; o.frequency.setValueAtTime(880, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(1320, c.currentTime+0.05);
      g.gain.setValueAtTime(0.1, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+0.08);
      o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+0.08);
    }),

    // ジュウジュウ持続ループ — フェードインで開始
    sizzleStart: () => play(c => {
      if (sizzleNodes) return; // already playing
      // ノイズバッファ生成（2秒ループ）
      const dur = 2, sr = c.sampleRate, buf = c.createBuffer(1, sr*dur, sr), d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        // 複数のノイズ帯域をミックスしてリアルなジュウジュウ感
        d[i] = (Math.random()*2-1) * 0.3;
        // 粒感を出すためにランダムにパチパチ
        if (Math.random() < 0.003) d[i] += (Math.random()-0.5) * 1.5;
      }
      const src = c.createBufferSource(); src.buffer = buf; src.loop = true;
      // バンドパスで油のジュウジュウ帯域を強調
      const bp = c.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 4000; bp.Q.value = 0.6;
      // ハイパスで低音カット
      const hp = c.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 1500;
      const gain = c.createGain();
      gain.gain.setValueAtTime(0, c.currentTime);
      gain.gain.linearRampToValueAtTime(0.08, c.currentTime+0.5); // fade in
      src.connect(bp); bp.connect(hp); hp.connect(gain); gain.connect(c.destination);
      src.start();
      sizzleNodes = {source: src, gain};
    }),

    // ジュウジュウ停止 — フェードアウト
    sizzleStop: () => {
      if (!sizzleNodes || !ctx) return;
      try {
        const {source, gain} = sizzleNodes;
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime+0.4);
        source.stop(ctx.currentTime+0.5);
      } catch {}
      sizzleNodes = null;
    },

    // 完成音：プシュー(蒸気) + チーン(ベル) の組み合わせ
    dishReady: () => play(c => {
      const t = c.currentTime;
      // 1) プシュー — 蒸気のホワイトノイズ、ハイパス
      const steamDur = 0.5, steamBuf = c.createBuffer(1, c.sampleRate*steamDur, c.sampleRate), sd = steamBuf.getChannelData(0);
      for (let i = 0; i < sd.length; i++) { sd[i] = (Math.random()*2-1) * Math.exp(-i/(c.sampleRate*0.15)) * 0.12; }
      const ss = c.createBufferSource(); ss.buffer = steamBuf;
      const shp = c.createBiquadFilter(); shp.type = "highpass"; shp.frequency.value = 5000;
      const sg = c.createGain(); sg.gain.setValueAtTime(0.15, t); sg.gain.exponentialRampToValueAtTime(0.001, t+0.5);
      ss.connect(shp); shp.connect(sg); sg.connect(c.destination); ss.start(t);

      // 2) チーン — 金属的なベル音（高周波サイン波 + 倍音）
      [1568, 2349, 3136].forEach((freq, i) => { // G6, D7, G7
        const o = c.createOscillator(), g = c.createGain();
        o.type = "sine"; o.frequency.value = freq;
        const onset = t + 0.08;
        g.gain.setValueAtTime(0, onset);
        g.gain.linearRampToValueAtTime(i===0 ? 0.12 : 0.05, onset+0.01);
        g.gain.exponentialRampToValueAtTime(0.001, onset + 0.8);
        o.connect(g); g.connect(c.destination);
        o.start(onset); o.stop(onset+0.8);
      });

      // 3) 明るいジングル（ドミソド↑、短い）
      [523, 659, 784, 1047].forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = "triangle"; o.frequency.value = freq;
        const onset = t + 0.15 + i*0.1;
        g.gain.setValueAtTime(0, onset);
        g.gain.linearRampToValueAtTime(0.08, onset+0.02);
        g.gain.exponentialRampToValueAtTime(0.001, onset+0.25);
        o.connect(g); g.connect(c.destination);
        o.start(onset); o.stop(onset+0.25);
      });
    }),
  };
})();

const getUserId = () => {
  let uid = localStorage.getItem("rsp_uid");
  if (!uid) { uid = "user_" + Math.random().toString(36).slice(2) + Date.now(); localStorage.setItem("rsp_uid", uid); }
  return uid;
};

const sbFetch = async (path, options = {}) => {
  const res = await fetch(path, { headers: {"Content-Type":"application/json"}, ...options });
  return res.json();
};

const loadInventory = async () => {
  try {
    const uid = getUserId();
    const data = await sbFetch(`/api/inventory?user_id=${uid}`);
    return Array.isArray(data) ? data.map(i => ({...i, id: i.id})) : [];
  } catch { return []; }
};

const saveItem = async (item) => {
  const uid = getUserId();
  try {
    const data = await sbFetch("/api/inventory", {
      method: "POST",
      body: JSON.stringify({user_id: uid, name: item.name, expiry: item.expiry || null, category: item.category || "冷蔵", ...(item.quantity != null && item.quantity !== "" ? {quantity: Number(item.quantity)} : {}), ...(item.fromFlyer ? {from_flyer: true} : {})}),
    });
    return Array.isArray(data) ? data[0] : data;
  } catch { return null; }
};

const deleteItem = async (id) => {
  try { await sbFetch(`/api/inventory?id=${id}`, {method:"DELETE"}); } catch {}
};

const updateItemDb = async (id, fields) => {
  try { await sbFetch(`/api/inventory?id=${id}`, {method:"PATCH", body: JSON.stringify(fields)}); } catch {}
};

// ─── ポイント ─────────────────────────────────────────────────────────────────

const loadPoints = async () => {
  try {
    const uid = getUserId();
    const data = await sbFetch(`/api/points?user_id=${uid}`);
    if (data && typeof data.balance === "number") return data.balance;
    return 0;
  } catch { return 0; }
};

const addPoints = async (amount) => {
  try {
    const uid = getUserId();
    const data = await sbFetch("/api/points", {
      method: "POST",
      body: JSON.stringify({user_id: uid, amount}),
    });
    if (data && typeof data.balance === "number") return data.balance;
    return null;
  } catch { return null; }
};

const generateTransferCode = () => {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // 紛らわしい文字(I,O,0,1)を除外
  const block = () => Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join("");
  return `RCP-${block()}-${block()}`;
};

const issueTransferCode = async () => {
  const uid = getUserId();
  for (let i = 0; i < 5; i++) { // 万一衝突した場合のリトライ
    const code = generateTransferCode();
    try {
      const data = await sbFetch("/api/transfer", {
        method: "POST",
        body: JSON.stringify({code, user_id: uid}),
      });
      if (data && data.code) return data.code;
    } catch {}
  }
  return null;
};

const redeemTransferCode = async (code) => {
  try {
    const normalized = code.trim().toUpperCase();
    const data = await sbFetch(`/api/transfer?code=${encodeURIComponent(normalized)}`);
    if (data && data.user_id) return data.user_id;
    return null;
  } catch { return null; }
};

const callClaude = async (system, messages) => {
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-haiku-4-5", max_tokens: 2000, system, messages }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.find(b => b.type === "text")?.text || "";
};

const toBase64 = (file) => new Promise((res, rej) => {
  const r = new FileReader();
  r.onload = e => res(e.target.result.split(",")[1]);
  r.onerror = rej;
  r.readAsDataURL(file);
});

const today = () => new Date().toISOString().split("T")[0];
const daysUntil = (d) => { if (!d) return null; return Math.ceil((new Date(d) - new Date()) / 86400000); };
const expiryColor = (d) => { const n = daysUntil(d); if (n===null) return "#c0ac98"; if (n<=1) return "#d6524e"; if (n<=3) return "#d67850"; return "#78aa6e"; };
const expiryLabel = (d) => { const n = daysUntil(d); if (n===null) return ""; if (n<=0) return "⚠️ 期限切れ"; if (n<=3) return `⚠️ あと${n}日`; return `期限：${d}`; };

const EXPIRY_OPTIONS = [
  { label: "今日中", days: 0 },
  { label: "2〜3日", days: 3 },
  { label: "1週間", days: 7 },
  { label: "1ヶ月以上", days: 30 },
  { label: "設定しない", days: null },
];
const addDays = (n) => { if (n===null) return null; const d = new Date(); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };
const expiryOptionLabel = (expiry) => { const n = daysUntil(expiry); if (n===null) return "設定しない"; if (n<=1) return "今日中"; if (n<=4) return "2〜3日"; if (n<=8) return "1週間"; return "1ヶ月以上"; };

const ExpiryPicker = ({ value, onChange }) => {
  const current = expiryOptionLabel(value);
  return (
    <div>
      <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>だいたいいつまで使えますか？</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:6}}>
        {EXPIRY_OPTIONS.map(opt => {
          const selected = current === opt.label;
          return (
            <button key={opt.label}
              style={{background:selected?"#e08c3a":"#faf0e6",border:`1.5px solid ${selected?"#e08c3a":"#f0d8b8"}`,borderRadius:20,padding:"4px 12px",fontSize:12,color:selected?"#fff":"#888",cursor:"pointer",fontFamily:"inherit"}}

// レシピ本文を「セクション」に分解してきれいに表示
const ParsedRecipe = ({ content }) => {
  // 主菜・副菜・汁物のセクションに分割（または1品料理本体）
  // 献立セット形式：🥘 主菜：...\n📋 材料\n...\n👨‍🍳 作り方\n...
  const sections = [];
  const lines = content.split(/\r?\n/);
  let current = null;
  let mode = null; // "ingredients" | "steps" | "comment" | null

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    // セット内の料理見出し
    if (/^(🥘|🥗|🍲)\s*(主菜|副菜|汁物)\s*[:：]/.test(line)) {
      if (current) sections.push(current);
      current = { kind: "dish", header: line, ingredients: [], steps: [] };
      mode = null;
      continue;
    }
    // 材料セクションへ
    if (/^📋|^材料/.test(line)) {
      if (!current) current = { kind: "single", header: null, ingredients: [], steps: [] };
      mode = "ingredients";
      continue;
    }
    // 作り方セクションへ
    if (/^👨‍🍳|^作り方/.test(line)) {
      if (!current) current = { kind: "single", header: null, ingredients: [], steps: [] };
      mode = "steps";
      continue;
    }
    // コメント
    if (/^💬/.test(line)) {
      if (current) { current.comment = line.replace(/^💬\s*/, ""); }
      mode = "comment";
      continue;
    }
    // 食材行
    if (mode === "ingredients" && /^[・·•]/.test(line)) {
      const m = line.replace(/^[・·•]\s*/, "").split(/\s*\.{2,}\s*|\s+\.\.\.\s+|\s{2,}/);
      const name = m[0] || line.replace(/^[・·•]\s*/, "");
      const qty = m.slice(1).join(" ").trim();
      if (!current) current = { kind: "single", header: null, ingredients: [], steps: [] };
      current.ingredients.push({ name: name.trim(), qty });
      continue;
    }
    // 手順行
    if (mode === "steps" && /^[①②③④⑤⑥⑦⑧⑨⑩]/.test(line)) {
      if (!current) current = { kind: "single", header: null, ingredients: [], steps: [] };
      current.steps.push(line);
      continue;
    }
    // メタ情報（時間・カロリー・合計時間など）はスキップ表示
  }
  if (current) sections.push(current);

  if (sections.length === 0) {
    // パースに失敗したら生テキストフォールバック
    return <div style={{fontSize:13,color:"#5a4a3a",lineHeight:2.1,whiteSpace:"pre-wrap"}}>{content.replace(/【[^】]+】/,"").trim()}</div>;
  }

  return (
    <div>
      {sections.map((sec, i) => (
        <div key={i} style={{marginBottom:i < sections.length - 1 ? 22 : 4}}>
          {sec.header && (
            <div style={{fontSize:15,fontWeight:700,color:"#5a4a3a",marginBottom:12,fontFamily:"'Kaisei Decol',serif"}}>
              {sec.header}
            </div>
          )}
          {sec.ingredients.length > 0 && (
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:"#8a7563",marginBottom:8,letterSpacing:"0.08em"}}>📋 材料</div>
              <div style={{background:"#fdf9f0",borderRadius:12,padding:"12px 16px"}}>
                {sec.ingredients.map((ing, j) => (
                  <div key={j} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"5px 0",borderBottom:j < sec.ingredients.length - 1 ? "1px dashed #f0e0c8" : "none",fontSize:13,color:"#5a4a3a"}}>
                    <span>{ing.name}</span>
                    {ing.qty && <span style={{color:"#8a7563",fontWeight:600,fontSize:12}}>{ing.qty}</span>}
                  </div>
                ))}
              </div>
            </div>
          )}
          {sec.steps.length > 0 && (
            <div style={{marginBottom:sec.comment ? 12 : 0}}>
              <div style={{fontSize:12,fontWeight:700,color:"#8a7563",marginBottom:8,letterSpacing:"0.08em"}}>👨‍🍳 作り方</div>
              <div>
                {sec.steps.map((step, j) => (
                  <div key={j} style={{display:"flex",gap:10,marginBottom:8,fontSize:13,color:"#5a4a3a",lineHeight:1.7}}>
                    <span style={{flexShrink:0,fontSize:14,fontWeight:700,color:"#d67850"}}>{step.match(/^[①②③④⑤⑥⑦⑧⑨⑩]/)?.[0] || ""}</span>
                    <span style={{flex:1}}>{step.replace(/^[①②③④⑤⑥⑦⑧⑨⑩]\s*/, "")}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {sec.comment && (
            <div style={{background:"#fff5ea",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#8a6d3a",lineHeight:1.7,fontStyle:"italic"}}>
              💬 {sec.comment}
            </div>
          )}
        </div>
      ))}
    </div>
  );
};

            {appMode==="meal_prep" && (

                    <button key={d} onClick={() => setPrepDays(d)}

                      {d}日

                  ))}

              </div>
            )}
            {inventory.length === 0 && appMode==="daily" && (
              <div style={{background:"linear-gradient(135deg,#fff5ea 0%,#fdf4e8 100%)",border:"1.5px solid #f0d8b8",borderRadius:24,padding:"22px 22px",marginBottom:16,boxShadow:"0 2px 14px rgba(214,120,80,0.08)"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#d67850",marginBottom:16,letterSpacing:"0.15em"}}>✨ はじめましての方へ</div>
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{background:"#d67850",color:"#fff",width:28,height:28,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0,boxShadow:"0 2px 6px rgba(214,120,80,0.25)"}}>1</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:700,color:"#5a4a3a"}}>🥕 食材を撮るだけ</div>
                      <div style={{fontSize:12,color:"#8a7563",marginTop:4,lineHeight:1.6}}>冷蔵庫やレシートを撮影するだけでOK</div>
                    </div>

                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{background:"#d67850",color:"#fff",width:28,height:28,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0,boxShadow:"0 2px 6px rgba(214,120,80,0.25)"}}>2</div>

                      <div style={{fontSize:15,fontWeight:700,color:"#5a4a3a"}}>🍳 今日の献立、まかせて</div>

                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{background:"#d67850",color:"#fff",width:28,height:28,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0,boxShadow:"0 2px 6px rgba(214,120,80,0.25)"}}>3</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:700,color:"#5a4a3a"}}>✨ レピ・ポイントも貯まる</div>

                    </div>

                <button

                  className="main-btn">

                </button>
              </div>
            )}
            <div style={S.sectionTitle}>🧺 冷蔵庫の中身</div>
            <div style={S.inventoryCard} onClick={() => setScreen("update")}>
              {inventory.length===0
                ? <div style={S.inventoryEmpty}>まだからっぽだよ〜<br/><span style={{fontSize:12,color:"#c0ac98"}}>タップして食材を入れよう</span></div>
                : <>
                    <div style={S.inventoryChips}>
                      {[...inventory].sort((a,b) => { if(!a.expiry) return 1; if(!b.expiry) return -1; return new Date(a.expiry)-new Date(b.expiry); }).slice(0,8).map(i => (
                        <div key={i.id} style={{...S.chip,borderColor:expiryColor(i.expiry)}}>{i.name}{i.quantity != null ? ` ×${i.quantity}` : ""}</div>
                      ))}
                      {inventory.length>8 && <div style={S.chipMore}>+{inventory.length-8}件</div>}
                    </div>
                    <div style={S.inventoryEditHint}>タップして編集 →</div>
                  </>
              }
            </div>
            <div style={S.sectionTitle}>🏷️ お得情報（あれば）</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div style={{...S.uploadBox,...(shopImages.length?S.uploadBoxFilled:{}),minHeight:80}} onClick={() => shopRef.current.click()} className="upload-box">
                {shopImages.length > 0
                  ? <div style={{padding:8,width:"100%"}}>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {shopImages.map((img,i) => (
                          <div key={i} style={{position:"relative",width:48,height:48}}>
                            <img src={img.url} alt="" style={{width:48,height:48,objectFit:"cover",borderRadius:8,border:"1px solid #f0e0c8"}}/>
                            <button onClick={(ev) => { ev.stopPropagation(); setShopImages(p => p.filter((_,j) => j!==i)); }}
                              style={{position:"absolute",top:-4,right:-4,background:"#fff",border:"1px solid #ddd",borderRadius:8,width:16,height:16,fontSize:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#c0392b"}}>✕</button>
                          </div>
                        ))}
                        <div style={{width:48,height:48,border:"1.5px dashed #e8c8a8",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:"#d67850"}}>+</div>
                      </div>
                      <div style={{fontSize:10,color:"#8a7563",marginTop:4,textAlign:"center"}}>{shopImages.length}枚</div>
                    </div>
                  : <div style={{...S.uploadInner,padding:12,flexDirection:"column",gap:4}}>
                      <div style={{fontSize:22}}>📄</div>
                      <div style={{color:"#e08c3a",fontSize:12,fontWeight:600}}>チラシを撮る（複数OK）</div>
                    </div>

              </div>

              <div style={{...S.uploadBox,minHeight:80,cursor:"default"}}>
                <textarea style={{...S.warmTextarea,marginBottom:0,border:"none",background:"transparent",height:"100%",fontSize:12,padding:10}} placeholder={"値引き情報を入力\n例：鶏もも半額"} value={shopText} onChange={e => setShopText(e.target.value)} rows={3}/>
              </div>
            </div>
            <textarea style={S.warmTextarea} placeholder={"追加のリクエスト（任意）\n例：あっさり系で、和食多め、20分以内"} value={extras} onChange={e => setExtras(e.target.value)} rows={2}/>

              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:"#b89f87",marginBottom:6,letterSpacing:"0.1em"}}>いつの献立？</div>

                    const sel = mealTimes.has(m.key);
                    return (
                      <button key={m.key} onClick={() => setMealTimes(prev => { const n=new Set(prev); if(n.has(m.key)) n.delete(m.key); else n.add(m.key); return n; })}

                        {m.icon} {m.label}
                      </button>
                    );
                  })}
                </div>
                <div style={{fontSize:10,color:"#c0ac98",marginTop:4}}>未選択なら時刻で自動判定</div>
              </div>
            )}
            {appMode==="daily" && (
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:"#b89f87",marginBottom:6,letterSpacing:"0.1em"}}>ボリューム</div>
                <div style={{display:"flex",gap:8}}>
                  {[{key:"simple",icon:"💨",label:"簡単"},{key:"standard",icon:"🍱",label:"標準"},{key:"hearty",icon:"🎊",label:"がっつり"}].map(v => {
                    const sel = volumeType===v.key;
                    return (
                      <button key={v.key} onClick={() => setVolumeType(v.key)}
                        style={{flex:1,background:sel?"#d67850":"#fdecd8",border:`1.5px solid ${sel?"#d67850":"#f0d8b8"}`,borderRadius:14,padding:"10px 4px",fontSize:13,fontWeight:700,color:sel?"#fff":"#8a7563",cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}>
                        {v.icon} {v.label}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
            {appMode==="daily" && (() => {
              const CHIP_GROUPS = [
                {title:"こだわり", tags:[
                  {label:"⏰ 15分以内", text:"15分以内で作れるもの"},
                  {label:"💪 がっつり", text:"ボリューム重視"},
                  {label:"🥗 ヘルシー", text:"ヘルシー・低カロリー"},
                  {label:"🔍 簡単", text:"簡単・初心者向け"},
                  {label:"🥘 優しい味", text:"優しい味付け・胃に優しい"},
                  {label:"🌶 ピリ辛", text:"ピリ辛・刺激的"},
                ]},
                {title:"ジャンル", tags:[
                  {label:"🌿 和食", text:"和食"},
                  {label:"🥢 中華", text:"中華"},
                  {label:"🍝 洋食", text:"洋食"},
                  {label:"🍛 エスニック", text:"エスニック・カレー系"},
                  {label:"🍜 麺系", text:"麺類を中心に"},
                  {label:"🍚 丼系", text:"丼ものを中心に"},
                ]},
                {title:"食材", tags:[
                  {label:"🥬 野菜たっぷり", text:"野菜たっぷり"},
                  {label:"🥩 お肉がっつり", text:"お肉メイン"},
                  {label:"🐟 お魚", text:"魚料理"},
                ]},
                {title:"シーン", tags:[
                  {label:"👶 子ども向け", text:"子どもが食べやすい"},
                  {label:"🍶 お酒のつまみ", text:"お酒のつまみ"},
                  {label:"🍱 お弁当にも", text:"お弁当にも使える"},
                ]},
              ];
              const chipBtn = (q) => {
                const selected = extras.includes(q.text);
                return (
                  <button key={q.label}
                    style={{background:selected?"#d67850":"#fdecd8",border:`1.5px solid ${selected?"#d67850":"#f0d8b8"}`,borderRadius:20,padding:"6px 14px",fontSize:12,color:selected?"#fff":"#8a7563",cursor:"pointer",fontFamily:"inherit",fontWeight:600,transition:"all 0.15s"}}
                    onClick={() => {
                      if (selected) {
                        setExtras(extras.split("、").filter(s => s.trim() !== q.text).join("、").trim());
                      } else {
                        setExtras(extras.trim() ? extras.trim().replace(/、$/,"") + "、" + q.text : q.text);
                      }
                    }}>
                    {q.label}
                  </button>
                );
              };
              return (
                <div style={{marginBottom:16,display:"flex",flexDirection:"column",gap:10}}>
                  {CHIP_GROUPS.map(g => (
                    <div key={g.title}>
                      <div style={{fontSize:11,fontWeight:700,color:"#b89f87",marginBottom:5,letterSpacing:"0.1em"}}>{g.title}</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {g.tags.map(chipBtn)}
                      </div>
                    </div>
                  ))}
                </div>
              );
            })()}
            <div style={S.gachaCard} className={gachaAnim ? "shaking" : ""}>
              <button
                style={{
                  ...S.gachaBtn,
                  ...(resultLoading ? S.gachaBtnDisabled : {}),
                }}
                onClick={() => { SFX.tap(); analyze(gachaMode); }}
                disabled={resultLoading}
                className="gacha-btn">
                {gachaAnim ? (
                  <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                    <span className="capsule-pop">🥚</span>
                    <span>{appMode==="meal_prep"?"作り置きレシピを考え中…":"今日の一択を導き出しています…"}</span>
                  </span>
                ) : (
                  <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                    <span style={{fontSize:22}}>{appMode==="meal_prep"?"🥡":"✨"}</span>
                    <span>{appMode==="meal_prep"?`AIに${prepDays}日分の作り置きをおまかせ`:"AIに「今日の一択」をおまかせする"}</span>
                  </span>
                )}
              </button>
              <div style={S.gachaModeBar}>
                {(appMode==="meal_prep"
                  ? [{key:"fridge",icon:"🥬",label:"在庫だけ"},{key:"shop",icon:"🛒",label:"買い物OK"}]
                  : [{key:"fridge",icon:"🥬",label:"在庫だけ"},{key:"shop",icon:"🛒",label:"買い物OK"},{key:"free",icon:"✨",label:"自由提案"}]
                ).map(m => (
                  <button key={m.key}
                    style={{...S.gachaModeBtn,...(gachaMode===m.key?S.gachaModeBtnActive:{})}}
                    onClick={() => setGachaMode(m.key)}>
                    {m.icon} {m.label}
                  </button>
                ))}
              </div>
            </div>
            {resultLoading && <div style={S.loadingRow}><span className="egg-wobble" style={{fontSize:18}}>🥚</span><span style={{color:"#d67850",fontSize:13}}>今日の献立を考え中…</span></div>}
          </div>
        )}

        {screen==="result" && (
          <div className="fade-in">
            <button onClick={() => setScreen("home")} style={{background:"none",border:"none",color:"#d67850",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",padding:"4px 0",marginBottom:8}}>◀ 条件入力に戻る</button>
            <div style={S.resultHeaderWrap}>
              <div style={S.resultTitleBig}>{appMode==="meal_prep"?"🥡 今週の作り置き":gachaMode==="free"?"✨ 新しい料理との出会い":"🍳 今日の一択"}</div>
              <div style={S.resultMeta}>{appMode==="meal_prep"?`${prepDays}日分・おかず3品・`:""}{people}人分 · {new Date().toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"})}</div>
            </div>

            {(() => {
              const shopping = result?.match(/🛒 (?:今日の買い物リスト|必要な食材リスト)：([\s\S]+?)$/)?.[1]?.trim();
              const isSetMode = recipes.some(r => r.includes("【献立セット"));

              return (
                <>
                  {recipes.map((recipe, idx) => {
                    let title, badge, time, calories;
                    if (isSetMode) {
                      const setNumMatch = recipe.match(/【(献立セット[①②③])】/);
                      const shusaiMatch = recipe.match(/🥘\s*主菜\s*[:：]\s*(.+)/);
                      title = shusaiMatch
                        ? `${setNumMatch?.[1] || "献立セット"} ${shusaiMatch[1].trim()}`
                        : setNumMatch?.[1] || `献立セット${idx+1}`;
                      badge = "主菜+副菜+汁物";
                      const timeMatch = recipe.match(/⏱ 合計調理時間:(.+)/);
                      time = timeMatch ? timeMatch[1].trim() : "";
                      const calMatch = recipe.match(/🔥 合計カロリー:(.+)/);
                      calories = calMatch ? calMatch[1].trim() : "";
                    } else if (appMode === "meal_prep") {
                      const titleMatch = recipe.match(/【[①②③]\s*(.+?)】(.+)?/);
                      title = titleMatch ? titleMatch[1] : `おかず${idx+1}`;
                      const genreMatch = recipe.match(/】(.+?)(?:\n|$)/);
                      badge = genreMatch ? genreMatch[1].trim() : "";
                      const storageMatch = recipe.match(/🕐 保存目安：(.+)/);
                      if (storageMatch) badge = (badge ? badge+" · " : "") + storageMatch[1].trim();
                      const timeMatch = recipe.match(/⏱ 調理時間[:：](.+)/);
                      time = timeMatch ? timeMatch[1].trim() : "";
                      const calMatch = recipe.match(/🔥 カロリー[:：](.+)/);
                      calories = calMatch ? calMatch[1].trim() : "";
                    } else {
                      const titleMatch = recipe.match(/【([①②③].+?)】(.+)?/);
                      title = titleMatch ? titleMatch[1] : `レシピ${idx+1}`;
                      badge = recipe.includes("🏠") ? "🏠在庫だけ" : recipe.match(/🛒(.+?)を買えば/)?.[0] || "";
                      const timeMatch = recipe.match(/⏱ 調理時間[:：](.+)/);
                      time = timeMatch ? timeMatch[1].trim() : "";
                      const calMatch = recipe.match(/🔥 カロリー[:：](.+)/);
                      calories = calMatch ? calMatch[1].trim() : "";
                    }
                    const showCooked = appMode==="daily" && gachaMode!=="free";
                    // 特売食材バッジ
                    const flyerItems = inventory.filter(i => i.from_flyer).map(i => i.name);
                    const usedFlyer = flyerItems.filter(name => recipe.includes(name));
                    const flyerBadge = usedFlyer.length > 0 ? (usedFlyer.length <= 2 ? usedFlyer.join("・") : usedFlyer.slice(0,2).join("・")+"など") : null;
                    // 作り置きモードは全カード表示、通常はメイン+altOpen
                    if (appMode==="meal_prep" || idx === 0) {
                      return (
                        <RecipeCard key={idx+recipe.slice(0,30)} title={title} badge={badge} time={time} calories={calories} content={recipe} flyerBadge={flyerBadge}
                          onSave={() => toggleSaveRecipe(recipe)} saved={isRecipeSaved(recipe)}
                          onCook={appMode==="daily" ? () => handleCook(title, recipe) : null}
                          onShare={() => { setShareTargetTitle(title); setSharePhoto(null); setShareMenu(true); }}
/>
                      );
                    }
                    if (!altOpen) return null;
                    return (
                      <RecipeCard key={idx+recipe.slice(0,30)} title={title} badge={badge} time={time} calories={calories} content={recipe} flyerBadge={flyerBadge}
                        onSave={() => toggleSaveRecipe(recipe)} saved={isRecipeSaved(recipe)}
                        onCook={appMode==="daily" ? () => handleCook(title, recipe) : null}
                        onShare={() => { setShareTargetTitle(title); setSharePhoto(null); setShareMenu(true); }}/>
                    );
                  })}
                  {appMode!=="meal_prep" && recipes.length > 1 && (
                    <button
                      style={S.altToggleBtn}
                      className="alt-toggle"
                      onClick={() => setAltOpen(!altOpen)}>
                      {altOpen
                        ? <span>▲ 別案を閉じる</span>
                        : <span>▼ 別案も見てみる（あと{recipes.length - 1}案）</span>
                      }
                    </button>
                  )}
                  {appMode==="meal_prep" && mealPrepExtra?.eatingPlan && (

                              <button onClick={(e) => { e.stopPropagation(); setUpdateImages(p => p.filter((_,j) => j!==i)); }}

                      </div>

                  }

                <input ref={singleRef} type="file" accept="image/*" style={{display:"none"}} onChange={e => handleUpdateScan(e,"single")}/>
                {updateLoading && <div style={S.loadingRow}><div style={S.spinnerOrange} className="spin"/><span style={{color:"#e08c3a",fontSize:13}}>読み取り中...</span></div>}
              </>
            )}
            {updatePreview && !updateLoading && (

                      <QuantityInput value={item.quantity} onChange={v => updatePreviewItem(idx,"quantity",v)}/>

                </div>
                <button style={S.mainBtn} onClick={confirmUpdate} className="main-btn">在庫に追加する（{updatePreview.filter(i=>i.name).length}件）</button>

                                  <ExpiryPicker value={item.expiry} onChange={v => updateItem(item.id,"expiry",v)}/>
                                  <QuantityInput value={item.quantity} onChange={v => updateItem(item.id,"quantity",v)}/>

                                <>
                                  <div style={S.itemName}>
                                    <span style={{fontSize:13,marginRight:6}}>{CATEGORY_ICONS[item.category||"冷蔵"]}</span>

                                    )}
                                  </div>
                                </>
                              )}

                            <div style={{display:"flex",gap:6}}>
                              <button style={S.iconBtn} onClick={() => setEditingId(isEditing?null:item.id)}>{isEditing?"✓":"✏️"}</button>
                              <button style={{...S.iconBtn,color:"#e05c5c"}} onClick={() => removeItem(item.id)}>✕</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </>
              }

          </div>

        {screen==="pointHistory" && (

              <button style={S.backBtn} onClick={() => setScreen("home")}>← 戻る</button>
              <span style={{color:"#888",fontSize:13}}>ポイント履歴</span>
            </div>
            <div style={{background:"linear-gradient(135deg,#fff5ea 0%,#fdecd8 100%)",border:"1.5px solid #f0d8b8",borderRadius:24,padding:"20px 22px",marginBottom:16}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:13,color:"#d67850",fontWeight:700,letterSpacing:"0.15em",marginBottom:8}}>🪙 レピ・ポイント</div>

                <div style={{fontSize:12,color:"#8a7563",marginTop:4}}>{getRank(points).icon} {getRank(points).name}</div>
              </div>
            </div>
            <div style={S.sectionTitle}>ポイントの貯め方</div>
            <div style={{background:"#fffcf7",border:"1.5px solid #f0e0c8",borderRadius:20,padding:"16px 20px",marginBottom:16,fontSize:12,color:"#8a7563",lineHeight:2}}>
              🥕 食材を登録 → <b style={{color:"#d67850"}}>+1pt</b><br/>
              🧾 レシートで登録 → <b style={{color:"#d67850"}}>+10pt</b><br/>
              🍳 料理を作って在庫更新 → <b style={{color:"#d67850"}}>+10pt</b><br/>
              🐦 X でシェア → <b style={{color:"#d67850"}}>+30pt</b>（1日1回）<br/>
              📷 Instagramでシェア → <b style={{color:"#d67850"}}>+30pt</b>（1日1回）<br/>
              💬 LINEでシェア → <b style={{color:"#d67850"}}>+10pt</b>（1日3回）
            </div>
          </div>
        )}

        {screen==="adminDashboard" && <AdminDashboard onBack={() => setScreen("settings")}/>}

        {screen==="savedRecipes" && (
          <div className="fade-in">
            <div style={S.backRow}>
              <button style={S.backBtn} onClick={() => setScreen("settings")}>← 戻る</button>
              <span style={{color:"#888",fontSize:13}}>保存したレシピ</span>
            </div>
            {savedRecipes.length === 0 ? (
              <div style={S.emptyState}>まだ保存したレシピがないよ〜<br/><span style={{fontSize:12}}>献立カードの📑ボタンで保存できるよ</span></div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {savedRecipes.map(r => (
                  <div key={r.id} style={{background:"#fffcf7",border:"1.5px solid #f0e0c8",borderRadius:16,padding:"14px 16px"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#5a4a3a"}}>{r.recipe_name}</div>
                      <button onClick={async () => { await sbFetch(`/api/recipes?id=${r.id}`,{method:"DELETE"}); setSavedRecipes(p=>p.filter(x=>x.id!==r.id)); }}
                        style={{background:"none",border:"none",color:"#ccc",fontSize:14,cursor:"pointer"}}>✕</button>
                    </div>
                    <div style={{fontSize:11,color:"#aaa",marginBottom:8}}>{new Date(r.saved_at).toLocaleDateString("ja-JP")} 保存</div>

                  </div>
                ))}
              </div>
            )}
          </div>
        )}

          // 日付グルーピング
          const grouped = {};
          cookedLogs.forEach(l => {
            const day = new Date(l.cooked_at).toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"short"});
            if (!grouped[day]) grouped[day] = [];
            grouped[day].push(l);
          });
          return (
            <div className="fade-in">
              <div style={S.backRow}>
                <button style={S.backBtn} onClick={() => setScreen("settings")}>← 戻る</button>
                <span style={{color:"#888",fontSize:13}}>作った料理の履歴</span>
              </div>
              {cookedLogs.length === 0 ? (
                <div style={S.emptyState}>まだ料理の記録がないよ〜<br/><span style={{fontSize:12}}>「🍳 これを作った！」で記録しよう</span></div>

                <div key={day} style={{marginBottom:16}}>

                        <details style={{marginTop:8}}>

                        </details>
                      )}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          );
        })()}

        {screen==="settings" && (
          <div className="fade-in">
            <div style={S.sectionTitle}>⚙️ 設定</div>
            {(() => {
              const rank = getRank(points);
              const nextPts = rank.next;
              const progress = nextPts ? Math.min(100, Math.round(((points - rank.min) / (nextPts - rank.min)) * 100)) : 100;
              return (
                <div style={{background:"linear-gradient(135deg,#fff5ea 0%,#fdecd8 100%)",border:"1.5px solid #f0d8b8",borderRadius:24,padding:"20px 22px",marginBottom:14,boxShadow:"0 2px 14px rgba(214,120,80,0.1)"}}>

                  <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
                    <div style={{fontSize:44}}>{rank.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:19,fontWeight:700,color:"#5a4a3a",fontFamily:"'Kaisei Decol',serif"}}>{rank.name}</div>
                      <div style={{fontSize:12,color:"#8a7563",marginTop:2}}>いま <span style={{fontWeight:700,color:"#d67850",fontSize:16}}>{points}</span> レピP 貯まってるよ</div>
                    </div>
                  </div>
                  {nextPts !== null ? (
                    <>
                      <div style={{height:10,background:"#fff",borderRadius:5,overflow:"hidden",marginBottom:6,border:"1px solid #f0e0c8"}}>
                        <div style={{height:"100%",width:`${progress}%`,background:"linear-gradient(90deg,#d67850,#e8a070)",transition:"width 0.4s"}}/>
                      </div>
                      <div style={{fontSize:11,color:"#8a7563",textAlign:"right"}}>次のランクまであと <span style={{color:"#d67850",fontWeight:700}}>{nextPts - points}P</span></div>
                    </>
                  ) : (
                    <div style={{fontSize:12,color:"#b8860b",textAlign:"center",fontWeight:700,padding:"4px 0"}}>✨ 最高ランク達成！いつもありがとう ✨</div>
                  )}
                  <div style={{fontSize:11,color:"#8a7563",marginTop:14,lineHeight:1.8,paddingTop:12,borderTop:"1px dashed #e8c8a8"}}>
                    🥕 食材を登録で +1 レピP<br/>
                    🧾 レシート登録で +10 レピP<br/>
                    🍳 料理を作って在庫更新で +10 レピP<br/>
                    <div style={{marginTop:10,padding:"10px 12px",background:"#fff5ea",borderRadius:12,color:"#c56640",fontWeight:600,lineHeight:1.7}}>
                      💝 コツコツ貯めたレピ・ポイントは、いつか家族や自分への「ちょっといいこと」に使えるかも♪
                    </div>
                  </div>
                </div>

              onChange={e => setRedeemInput(e.target.value)}
              placeholder="RCP-XXXX-XXXX"
              style={{width:"100%",boxSizing:"border-box",padding:"12px 14px",border:"1.5px solid #e8d8c0",borderRadius:10,fontSize:16,fontFamily:"monospace",letterSpacing:"0.05em",textAlign:"center",marginBottom:10,textTransform:"uppercase"}}
              disabled={redeeming}
            />
            {redeemError && <div style={{color:"#c0392b",fontSize:12,marginBottom:10,textAlign:"center"}}>{redeemError}</div>}
            <div style={{fontSize:11,color:"#c0392b",lineHeight:1.6,background:"#fff5f5",padding:"10px 12px",borderRadius:8,marginBottom:14}}>
              ⚠️ この端末の現在のデータ（在庫・ポイント）は消えて、引き継ぎ先のデータに置き換わります。
            </div>
            <button
              onClick={handleRedeemCode}
              disabled={redeeming}
              style={{...S.mainBtn,background:redeeming?"#ddd":"#e08c3a",color:"#fff",width:"100%",marginBottom:8}}>
              {redeeming ? "引き継ぎ中..." : "引き継ぐ"}
            </button>
            <button
              onClick={() => setTransferModal(null)}
              disabled={redeeming}
              style={{width:"100%",background:"none",border:"none",color:"#888",fontSize:13,padding:"8px 0 0",cursor:"pointer",fontFamily:"inherit"}}>
              キャンセル
            </button>
          </div>
        </div>
      )}
      {pwaModal && (() => {
        const ua = navigator.userAgent;
        const isIOS = /iP(hone|ad|od)/.test(ua);
        const isAndroid = /Android/.test(ua);
        return (
          <div style={{position:"fixed",inset:0,background:"rgba(90,74,58,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:250,padding:20}} onClick={() => setPwaModal(false)}>
            <div style={{width:"100%",maxWidth:400,background:"#fffcf7",borderRadius:24,padding:"24px 22px"}} onClick={e => e.stopPropagation()}>
              <div style={{fontSize:17,fontWeight:700,color:"#5a4a3a",marginBottom:14}}>📲 ホーム画面に追加</div>
              {isIOS ? (
                <div style={{fontSize:13,color:"#5a4a3a",lineHeight:2}}>
                  <div style={{marginBottom:8}}><b>Safari</b> で開いてね</div>
                  <div>① 画面下の <span style={{fontSize:16}}>⬆️</span> <b>共有ボタン</b>をタップ</div>
                  <div>② 下にスクロールして<b>「ホーム画面に追加」</b>をタップ</div>
                  <div>③ <b>「追加」</b>をタップで完了！</div>
                </div>
              ) : isAndroid ? (
                <div style={{fontSize:13,color:"#5a4a3a",lineHeight:2}}>
                  <div style={{marginBottom:8}}><b>Chrome</b> で開いてね</div>
                  <div>① 右上の <b>︙</b>（メニュー）をタップ</div>
                  <div>② <b>「ホーム画面に追加」</b>をタップ</div>
                  <div>③ <b>「追加」</b>をタップで完了！</div>
                </div>
              ) : (
                <div style={{fontSize:13,color:"#5a4a3a",lineHeight:2}}>
                  ブラウザのメニューから<b>「ホーム画面に追加」</b>または<b>「アプリとしてインストール」</b>を選んでね
                </div>
              )}
              <div style={{fontSize:12,color:"#8a7563",marginTop:14,lineHeight:1.7,background:"#fdf6e8",borderRadius:12,padding:"10px 14px"}}>
                アプリみたいにサクサク使えて、アドレスバーも消えるよ！
              </div>
              <button onClick={() => setPwaModal(false)}
                style={{width:"100%",background:"none",border:"none",color:"#888",fontSize:13,padding:"14px 0 0",cursor:"pointer",fontFamily:"inherit"}}>
                閉じる
              </button>
            </div>
          </div>
        );
      })()}
      {pwaBanner && (
        <div style={{position:"fixed",bottom:70,left:12,right:12,zIndex:150,background:"#fffcf7",border:"1.5px solid #f0e0c8",borderRadius:16,padding:"12px 16px",boxShadow:"0 4px 16px rgba(160,120,80,0.15)",display:"flex",alignItems:"center",gap:10}} className="fade-in">
          <span style={{fontSize:15,flexShrink:0}}>📲</span>
          <span style={{flex:1,fontSize:12,color:"#5a4a3a",lineHeight:1.5,cursor:"pointer"}} onClick={() => { setPwaBanner(false); setPwaModal(true); }}>
            <b>ホーム画面に追加</b>するとアプリみたいに使えるよ
          </span>
          <button onClick={() => { setPwaBanner(false); localStorage.setItem("repi_pwa_banner_dismissed","1"); }}
            style={{background:"none",border:"none",color:"#b89f87",fontSize:16,cursor:"pointer",flexShrink:0,padding:4}}>✕</button>
        </div>
      )}
      <TabBar/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
