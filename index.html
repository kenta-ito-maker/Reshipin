const getUserId = () => {
  let uid = localStorage.getItem("rsp_uid");
  if (!uid) { uid = "user_" + Math.random().toString(36).slice(2) + Date.now(); localStorage.setItem("rsp_uid", uid); }
  return uid;
};

const sbFetch = async (path, options = {}) => {
  const res = await fetch(path, { headers: {"Content-Type":"application/json"}, ...options });
  return res.json();
};

const loadInventory = async () => {
  try {
    const uid = getUserId();
    const data = await sbFetch(`/api/inventory?user_id=${uid}`);
    return Array.isArray(data) ? data.map(i => ({...i, id: i.id})) : [];
  } catch { return []; }
};

const saveItem = async (item) => {
  const uid = getUserId();
  try {
    const data = await sbFetch("/api/inventory", {
      method: "POST",
      body: JSON.stringify({user_id: uid, name: item.name, expiry: item.expiry || null, category: item.category || "冷蔵"}),
    });
    return Array.isArray(data) ? data[0] : data;
  } catch { return null; }
};

const deleteItem = async (id) => {
  try { await sbFetch(`/api/inventory?id=${id}`, {method:"DELETE"}); } catch {}
};

const updateItemDb = async (id, fields) => {
  try { await sbFetch(`/api/inventory?id=${id}`, {method:"PATCH", body: JSON.stringify(fields)}); } catch {}
};

const callClaude = async (system, messages) => {
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-haiku-4-5", max_tokens: 2000, system, messages }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.find(b => b.type === "text")?.text || "";
};

const toBase64 = (file) => new Promise((res, rej) => {
  const r = new FileReader();
  r.onload = e => res(e.target.result.split(",")[1]);
  r.onerror = rej;
  r.readAsDataURL(file);
});

const today = () => new Date().toISOString().split("T")[0];
const daysUntil = (d) => { if (!d) return null; return Math.ceil((new Date(d) - new Date()) / 86400000); };
const expiryColor = (d) => { const n = daysUntil(d); if (n===null) return "#bbb"; if (n<=1) return "#e05c5c"; if (n<=3) return "#e08c3a"; return "#5aaa6e"; };
const expiryLabel = (d) => { const n = daysUntil(d); if (n===null) return ""; if (n<=0) return "⚠️ 期限切れ"; if (n<=3) return `⚠️ あと${n}日`; return `期限：${d}`; };

const EXPIRY_OPTIONS = [
  { label: "今日中", days: 0 },
  { label: "2〜3日", days: 3 },
  { label: "1週間", days: 7 },
  { label: "1ヶ月以上", days: 30 },
  { label: "設定しない", days: null },
];
const addDays = (n) => { if (n===null) return null; const d = new Date(); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };
const expiryOptionLabel = (expiry) => { const n = daysUntil(expiry); if (n===null) return "設定しない"; if (n<=1) return "今日中"; if (n<=4) return "2〜3日"; if (n<=8) return "1週間"; return "1ヶ月以上"; };

const ExpiryPicker = ({ value, onChange }) => {

            ✓ これを作った（在庫を減らす）

      )}
    </div>
  );
};

function App() {
  const load = (key, fb) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch { return fb; } };
  const [inventory, setInvRaw] = useState([]);
  const [invLoading, setInvLoading] = useState(true);
  const [people, setPplRaw] = useState(() => load("rsp_ppl", 2));
  const [familyNote, setFamRaw] = useState(() => load("rsp_fam", ""));
  const [screen, setScreen] = useState("loading");

  useEffect(() => {
    loadInventory().then(data => {
      setInvRaw(data);
      setInvLoading(false);
      setScreen(data.length > 0 ? "home" : "fridge");
    });
  }, []);

  const setInventory = async (v) => {
    const n = typeof v==="function"?v(inventory):v;
    setInvRaw(n);
  };

  const addToInventory = async (items) => {
    const saved = await Promise.all(items.map(i => saveItem(i)));
    const valid = saved.filter(Boolean);
    setInvRaw(prev => [...prev, ...valid]);
  };

  const removeFromInventory = async (id) => {
    await deleteItem(id);
    setInvRaw(prev => prev.filter(i => i.id !== id));
  };

  const updateInInventory = async (id, field, value) => {
    await updateItemDb(id, {[field]: value});
    setInvRaw(prev => prev.map(i => i.id===id?{...i,[field]:value}:i));
  };

  const setPeople = v => { const n = typeof v==="function"?v(people):v; setPplRaw(n); try{localStorage.setItem("rsp_ppl",JSON.stringify(n));}catch{} };
  const setFamilyNote = v => { setFamRaw(v); try{localStorage.setItem("rsp_fam",JSON.stringify(v));}catch{} };

  const [fridgeImages, setFridgeImages] = useState([]);
  const [fridgeLoading, setFridgeLoading] = useState(false);
  const [fridgePreview, setFridgePreview] = useState(null);
  const fridgeRef = useRef();

  const [shopImage, setShopImage] = useState(null);
  const [shopB64, setShopB64] = useState(null);
  const [shopText, setShopText] = useState("");
  const [extras, setExtras] = useState("");
  const [result, setResult] = useState(null);
  const [resultLoading, setResultLoading] = useState(false);
  const shopRef = useRef();

  const [updateMode, setUpdateMode] = useState(null);
  const [updateImage, setUpdateImage] = useState(null);
  const [updateLoading, setUpdateLoading] = useState(false);
  const [updatePreview, setUpdatePreview] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [categoryTab, setCategoryTab] = useState("すべて");
  const [consumeModal, setConsumeModal] = useState(null); // {loading, items: [{id,name,used,remain}]}
  const receiptRef = useRef();
  const updateFridgeRef = useRef();
  const singleRef = useRef();

  const openConsume = async (recipeContent) => {
    setConsumeModal({loading: true, items: null});
    try {
      const raw = await callClaude(PROMPT_CONSUME(recipeContent, inventory, people), [{role:"user",content:[{type:"text",text:"使用食材を予測してください。"}]}]);
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setConsumeModal({loading: false, items: Array.isArray(parsed) ? parsed : []});
    } catch(e) {
      setConsumeModal({loading: false, items: [], error: "予測に失敗しました"});
    }
  };

  const confirmConsume = async () => {
    if (!consumeModal?.items) return;
    for (const it of consumeModal.items) {
      if (it.remain === "全部使った") {
        await deleteItem(it.id);
      } else {
        const noteMap = {"少し残った":"少し","半分残った":"半分","ほぼ残ってる":""};
        const note = noteMap[it.remain];
        if (note) await updateItemDb(it.id, {note});
      }
    }
    const freshInv = await loadInventory();
    setInvRaw(freshInv);
    setConsumeModal(null);
  };

  const handleFridgeScan = async (e) => {
    const files = Array.from(e.target.files); if (!files.length) return;
    setFridgeLoading(true);
    try {
      const newImgs = await Promise.all(files.map(async f => ({ url: URL.createObjectURL(f), b64: await toBase64(f) })));
      const allImgs = [...fridgeImages, ...newImgs];
      setFridgeImages(allImgs);
      const content = [
        ...allImgs.map(img => ({ type:"image", source:{type:"base64",media_type:"image/jpeg",data:img.b64} })),
        { type:"text", text:`今日は${today()}です。冷蔵庫の食材を全て読み取ってください。` },
      ];
      const raw = await callClaude(PROMPT_FRIDGE_SCAN, [{role:"user",content}]);
      setFridgePreview(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    } catch(e) { setFridgePreview([]); }
    setFridgeLoading(false);
  };

  const confirmFridge = async () => {
    const valid = fridgePreview.filter(i => i.name?.trim());
    await addToInventory(valid);
    setFridgeImages([]);
    setScreen("home");
  };

  const analyze = async (mode) => {
    setResultLoading(true);
    try {
      const isFridgeOnly = mode === "fridge";
      const sysPrompt = isFridgeOnly
        ? PROMPT_KONDATE(inventory, "※在庫にある食材だけで作れる献立を提案してください。買い物不要のものだけ。", people, familyNote, extras)
        : PROMPT_KONDATE(inventory, shopText || "特売・値引き情報なし", people, familyNote, extras);
      const content = !isFridgeOnly && shopB64
        ? [{type:"image",source:{type:"base64",media_type:"image/jpeg",data:shopB64}},{type:"text",text:`チラシ写真。補足：${shopText||"なし"}`}]
        : [{type:"text",text:isFridgeOnly?"在庫にある食材だけで献立を3つ提案してください。":"在庫と特売情報から献立を提案してください。"}];
      const text = await callClaude(sysPrompt, [{role:"user",content}]);
      setResult(text);
      setScreen("result");
    } catch(err) { setResult("エラー："+err.message); setScreen("result"); }
    setResultLoading(false);
  };

  const handleUpdateScan = async (e, type) => {
    const f = e.target.files[0]; if (!f) return;
    setUpdateImage(URL.createObjectURL(f));
    setUpdateLoading(true);
    try {
      const b64 = await toBase64(f);
      const prompt = type==="receipt"?PROMPT_RECEIPT:type==="single"?PROMPT_SINGLE:PROMPT_FRIDGE_SCAN;
      const raw = await callClaude(prompt, [{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
        {type:"text",text:`今日は${today()}です。読み取ってください。`},
      ]}]);
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setUpdatePreview(Array.isArray(parsed)?parsed:[parsed]);
    } catch { setUpdatePreview([]); }
    setUpdateLoading(false);
  };

  const confirmUpdate = async () => {
    const valid = updatePreview.filter(i => i.name?.trim());
    await addToInventory(valid);
    setUpdatePreview(null); setUpdateImage(null); setUpdateMode(null);
  };

  const removeItem = id => removeFromInventory(id);
  const updateItem = (id,f,v) => updateInInventory(id,f,v);
  const updatePreviewItem = (idx,f,v) => setUpdatePreview(p => p.map((it,i) => i===idx?{...it,[f]:v}:it));

  const TabBar = () => (
    <div style={S.tabBar}>
      {[{key:"home",icon:"🍳",label:"献立"},{key:"update",icon:"🧺",label:"在庫"},{key:"settings",icon:"⚙️",label:"設定"}].map(t => (
        <button key={t.key}
          style={{...S.tab,...(screen===t.key||(screen==="result"&&t.key==="home")?S.tabActive:{})}}
          onClick={() => { setScreen(t.key); if(t.key==="home") setResult(null); }}>
          <div style={S.tabIcon}>{t.icon}</div>
          <div>{t.label}</div>
        </button>
      ))}
    </div>
  );


  if (screen==="loading") return (
    <div style={{...S.root, justifyContent:"center", alignItems:"center", gap:16}}>
      <div style={{fontSize:36}}>🍽️</div>
      <div style={{color:"#e08c3a", fontSize:16, fontWeight:700}}>レシピン</div>
      <div style={S.spinnerOrange} className="spin"/>
    </div>
  );

  if (screen==="fridge") return (
    <div style={S.root}>
      <div style={S.onboardWrap} className="fade-in">
        <div style={S.onboardTop}>
          <div style={S.logoWrap}><span style={S.logoEmoji}>🍽️</span><span style={S.logoText}>レシピン</span></div>
          <div style={S.catchcopy}>「今日、何作ろう？」<br/>そのお悩み、解決します。</div>
        </div>
        {!fridgePreview ? (
          <>
            <div style={S.stepCard}>
              <div style={S.stepNum}>まずはじめに</div>
              <div style={S.stepTitle}>冷蔵庫の中身を教えてください🧊</div>
              <div style={S.stepDesc}>写真を撮るか、手入力でどうぞ。棚ごとに複数枚撮ってもOK！</div>
              {fridgeImages.length > 0 && (
                <div style={S.thumbRow}>{fridgeImages.map((img,idx) => <img key={idx} src={img.url} alt="" style={S.thumbImg}/>)}</div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <div style={{...S.uploadBox,minHeight:80}} onClick={() => fridgeRef.current.click()} className="upload-box">
                  <div style={{...S.uploadInner,padding:12,flexDirection:"column",gap:4}}>
                    <div style={{fontSize:22}}>📷</div>
                    <div style={{color:"#e08c3a",fontSize:12,fontWeight:600}}>{fridgeImages.length===0?"写真を撮る":"もう1枚追加"}</div>
                  </div>
                </div>
                <div style={{...S.uploadBox,minHeight:80}} onClick={() => setFridgePreview([{name:"",expiry:null}])} className="upload-box">
                  <div style={{...S.uploadInner,padding:12,flexDirection:"column",gap:4}}>
                    <div style={{fontSize:22}}>✏️</div>
                    <div style={{color:"#e08c3a",fontSize:12,fontWeight:600}}>手入力する</div>
                  </div>
                </div>
              </div>
              <input ref={fridgeRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleFridgeScan}/>
              {fridgeLoading && <div style={S.loadingRow}><div style={S.spinnerOrange} className="spin"/><span style={{color:"#e08c3a",fontSize:13}}>食材を読み取り中...</span></div>}
            </div>
            <button style={S.skipLink} onClick={() => setScreen("home")}>あとで設定する</button>
          </>
        ) : (
          <>
            <div style={S.stepCard}>
              <div style={S.stepNum}>確認してください</div>
              <div style={S.stepTitle}>読み取った食材 {fridgePreview.length}件 🎉</div>
              <div style={S.stepDesc}>内容を確認して登録してください。</div>
              <div style={S.previewList}>
                {fridgePreview.map((item,idx) => (
                  <div key={idx} style={S.previewRow}>
                    <input style={S.warmInput} value={item.name} placeholder="食材名" onChange={e => setFridgePreview(p => p.map((it,i) => i===idx?{...it,name:e.target.value}:it))}/>
                    <CategoryPicker value={item.category} onChange={v => setFridgePreview(p => p.map((it,i) => i===idx?{...it,category:v}:it))}/>
                    <ExpiryPicker value={item.expiry} onChange={v => setFridgePreview(p => p.map((it,i) => i===idx?{...it,expiry:v}:it))}/>
                  </div>
                ))}
                <button style={S.addRowBtn} onClick={() => setFridgePreview(p => [...p,{name:"",expiry:null,category:"冷蔵"}])}>＋ 食材を追加</button>
              </div>
            </div>
            <button style={S.mainBtn} onClick={confirmFridge} className="main-btn">登録して献立を見る →</button>
            <button style={S.skipLink} onClick={() => { setFridgeImages([]); setFridgePreview(null); }}>撮り直す</button>
          </>
        )}
      </div>
    </div>
  );

  return (
    <div style={S.root}>
      <div style={S.appHeader}><div style={S.logoSmall}>🍽️ レシピン</div></div>
      <div style={S.appContent}>

        {screen==="home" && (
          <div className="fade-in">
            <div style={S.greeting}>こんにちは！今日は何人分ですか？</div>
            <div style={S.peopleCard}>
              <div style={S.peopleLabel}>👨‍👩‍👧 今日の人数</div>
              <div style={S.peopleRow}>
                <button style={S.peopleBtn} onClick={() => setPeople(p => Math.max(1,p-1))}>－</button>
                <div style={S.peopleNum}>{people}<span style={S.peopleUnit}>人分</span></div>
                <button style={S.peopleBtn} onClick={() => setPeople(p => p+1)}>＋</button>
              </div>
            </div>
            <div style={S.sectionTitle}>🧺 冷蔵庫の中身</div>
            <div style={S.inventoryCard} onClick={() => setScreen("update")}>
              {inventory.length===0
                ? <div style={S.inventoryEmpty}>食材を登録してください<br/><span style={{fontSize:12,color:"#ddd"}}>在庫タブから追加できます</span></div>
                : <>
                    <div style={S.inventoryChips}>
                      {[...inventory].sort((a,b) => { if(!a.expiry) return 1; if(!b.expiry) return -1; return new Date(a.expiry)-new Date(b.expiry); }).slice(0,8).map(i => (
                        <div key={i.id} style={{...S.chip,borderColor:expiryColor(i.expiry)}}>{i.name}</div>
                      ))}
                      {inventory.length>8 && <div style={S.chipMore}>+{inventory.length-8}件</div>}
                    </div>
                    <div style={S.inventoryEditHint}>タップして編集 →</div>
                  </>
              }
            </div>
            <div style={S.sectionTitle}>🏷️ お得情報（あれば）</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div style={{...S.uploadBox,...(shopImage?S.uploadBoxFilled:{}),minHeight:80}} onClick={() => shopRef.current.click()} className="upload-box">
                {shopImage
                  ? <img src={shopImage} alt="" style={{...S.uploadPreview,height:80}}/>
                  : <div style={{...S.uploadInner,padding:12,flexDirection:"column",gap:4}}>
                      <div style={{fontSize:22}}>📄</div>
                      <div style={{color:"#e08c3a",fontSize:12,fontWeight:600}}>チラシを撮る</div>
                    </div>
                }
              </div>
              <input ref={shopRef} type="file" accept="image/*" style={{display:"none"}} onChange={async e => { const f=e.target.files[0]; if(!f) return; setShopImage(URL.createObjectURL(f)); setShopB64(await toBase64(f)); }}/>
              <div style={{...S.uploadBox,minHeight:80,cursor:"default"}}>
                <textarea style={{...S.warmTextarea,marginBottom:0,border:"none",background:"transparent",height:"100%",fontSize:12,padding:10}} placeholder={"値引き情報を入力\n例：鶏もも半額"} value={shopText} onChange={e => setShopText(e.target.value)} rows={3}/>
              </div>
            </div>
            <textarea style={S.warmTextarea} placeholder={"その他のご希望（任意）\n例：20分以内、子どもが食べやすいもの"} value={extras} onChange={e => setExtras(e.target.value)} rows={2}/>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
              {[
                {label:"⏱ 短時間で", text:"20分以内で作れるもの"},
                {label:"💪 がっつり", text:"ボリューム重視"},
                {label:"🥗 ヘルシー", text:"ヘルシー・低カロリー"},
                {label:"🍳 簡単", text:"簡単・初心者向け"},
                {label:"👶 子ども向け", text:"子どもが食べやすい"},
                {label:"🍻 つまみ", text:"お酒のつまみ"},
              ].map(q => {
                const selected = extras.includes(q.text);
                return (
                  <button key={q.label}
                    style={{background:selected?"#e08c3a":"#faf0e6",border:`1.5px solid ${selected?"#e08c3a":"#f0d8b8"}`,borderRadius:20,padding:"5px 12px",fontSize:12,color:selected?"#fff":"#888",cursor:"pointer",fontFamily:"inherit"}}
                    onClick={() => {
                      if (selected) {
                        setExtras(extras.split("、").filter(s => s.trim() !== q.text).join("、").trim());
                      } else {
                        setExtras(extras.trim() ? extras.trim().replace(/、$/,"") + "、" + q.text : q.text);
                      }
                    }}>
                    {q.label}
                  </button>
                );
              })}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
              <button style={{...S.mainBtn,background:"#5aaa6e",...(inventory.length===0?S.mainBtnDisabled:{})}} onClick={() => analyze("fridge")} disabled={inventory.length===0} className="main-btn">
                🏠 {inventory.length===0?"在庫なし":"今あるもので"}
              </button>
              <button style={S.mainBtn} onClick={() => analyze("shop")} className="main-btn">
                🛒 買い物してから
              </button>
            </div>
            {resultLoading && <div style={S.loadingRow}><div style={S.spinnerOrange} className="spin"/><span style={{color:"#e08c3a",fontSize:13}}>AIが献立を考えています...</span></div>}
          </div>
        )}

        {screen==="result" && (
          <div className="fade-in">
            <div style={S.resultHeaderWrap}>
              <div style={S.resultTitleBig}>🍽️ 今夜の献立</div>
              <div style={S.resultMeta}>{people}人分 · {new Date().toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"})}</div>
            </div>

            {(() => {
              // 結果を3つのレシピに分割
              const blocks = result.split(/(?=【[①②③])/);
              const warning = blocks[0]?.includes("⚠️") ? blocks[0].trim() : null;
              const recipes = blocks.filter(b => b.match(/【[①②③]/));
              const shopping = result.match(/🛒 今日の買い物リスト：([\s\S]+?)$/)?.[1]?.trim();

              return (
                <>
                  {warning && (
                    <div style={{background:"#fff5f5",border:"1.5px solid #ffb3b3",borderRadius:12,padding:"12px 16px",marginBottom:12,fontSize:13,color:"#e05c5c",lineHeight:1.8}}>
                      {warning}
                    </div>
                  )}
                  {recipes.map((recipe, idx) => {
                    const titleMatch = recipe.match(/【([①②③].+?)】(.+)?/);
                    const title = titleMatch ? titleMatch[1] : `レシピ${idx+1}`;
                    const badge = recipe.includes("🏠") ? "🏠在庫だけ" : recipe.match(/🛒(.+?)を買えば/)?.[0] || "";
                    const timeMatch = recipe.match(/⏱ 調理時間：(.+)/);
                    const time = timeMatch ? timeMatch[1].trim() : "";
                    const calMatch = recipe.match(/🔥 カロリー：(.+)/);
                    const calories = calMatch ? calMatch[1].trim() : "";
                    return (
                      <RecipeCard key={idx} title={title} badge={badge} time={time} calories={calories} content={recipe} onCooked={() => openConsume(recipe)}/>
                    );
                  })}
                  {shopping && shopping !== "不要" && (
                    <div style={{background:"#f0faf2",border:"1.5px solid #5aaa6e",borderRadius:16,padding:"16px 18px",marginBottom:12}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#5aaa6e",marginBottom:8}}>🛒 今日の買い物リスト</div>
                      <div style={{fontSize:13,color:"#333",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{shopping}</div>
                    </div>
                  )}
                </>
              );
            })()}

            <button style={S.mainBtn} onClick={() => { setResult(null); setShopImage(null); setShopB64(null); setShopText(""); setExtras(""); setScreen("home"); }} className="main-btn">もう一度考えてもらう 🔄</button>
          </div>
        )}

        {screen==="update" && (
          <div className="fade-in">
            <div style={S.sectionTitle}>食材を追加する</div>
            {!updateMode && !updatePreview && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
                {[{key:"fridge2",icon:"🧊",title:"冷蔵庫を撮る",sub:"食材を一括認識"},{key:"receipt",icon:"🧾",title:"レシートを撮る",sub:"買ったものを一括登録"},{key:"single",icon:"🥦",title:"食材を撮る",sub:"1品ずつ読み込む"},{key:"manual",icon:"✏️",title:"手入力する",sub:"直接入力する"}].map(m => (
                  <button key={m.key} style={S.modeCard} className="mode-card" onClick={() => setUpdateMode(m.key)}>
                    <div style={{fontSize:32,marginBottom:6}}>{m.icon}</div>
                    <div style={S.modeCardTitle}>{m.title}</div>
                    <div style={S.modeCardSub}>{m.sub}</div>
                  </button>
                ))}
              </div>
            )}
            {updateMode==="manual" && !updatePreview && (
              <div className="fade-in">
                <div style={S.backRow}>
                  <button style={S.backBtn} onClick={() => setUpdateMode(null)}>← 戻る</button>
                  <span style={{color:"#888",fontSize:13}}>手入力する</span>
                </div>
                <div style={S.previewList}>
                  {(updatePreview||[{name:"",expiry:null,category:"冷蔵"}]).map((item,idx) => (
                    <div key={idx} style={S.previewRow}>
                      <input style={S.warmInput} value={item.name} placeholder="食材名（例：鶏もも肉）"
                        onChange={e => setUpdatePreview(p => { const n=[...(p||[{name:"",expiry:null,category:"冷蔵"}])]; n[idx]={...n[idx],name:e.target.value}; return n; })}/>
                      <CategoryPicker value={item.category} onChange={v => setUpdatePreview(p => { const n=[...(p||[{name:"",expiry:null,category:"冷蔵"}])]; n[idx]={...n[idx],category:v}; return n; })}/>
                      <ExpiryPicker value={item.expiry} onChange={v => setUpdatePreview(p => { const n=[...(p||[{name:"",expiry:null,category:"冷蔵"}])]; n[idx]={...n[idx],expiry:v}; return n; })}/>
                    </div>
                  ))}
                  <button style={S.addRowBtn} onClick={() => setUpdatePreview(p => [...(p||[{name:"",expiry:null,category:"冷蔵"}]),{name:"",expiry:null,category:"冷蔵"}])}>＋ 食材を追加</button>
                </div>
                <button style={S.mainBtn} onClick={confirmUpdate} className="main-btn">
                  在庫に追加する（{(updatePreview||[]).filter(i=>i.name).length}件）
                </button>
              </div>
            )}

            {(updateMode==="fridge2"||updateMode==="receipt"||updateMode==="single") && !updatePreview && (
              <>
                <div style={S.backRow}>
                  <button style={S.backBtn} onClick={() => { setUpdateMode(null); setUpdateImage(null); }}>← 戻る</button>
                  <span style={{color:"#888",fontSize:13}}>{updateMode==="fridge2"?"冷蔵庫を撮る":updateMode==="receipt"?"レシートを撮る":"食材を撮る"}</span>
                </div>
                <div style={{...S.uploadBox,...(updateImage?S.uploadBoxFilled:{}),minHeight:140}} onClick={() => (updateMode==="fridge2"?updateFridgeRef:updateMode==="receipt"?receiptRef:singleRef).current.click()} className="upload-box">
                  {updateImage
                    ? <img src={updateImage} alt="" style={S.uploadPreview}/>
                    : <div style={S.uploadInner}><div style={S.uploadIcon}>{updateMode==="fridge2"?"🧊":updateMode==="receipt"?"🧾":"🥦"}</div><div style={S.uploadText}>{updateMode==="fridge2"?"冷蔵庫の写真を選ぶ":updateMode==="receipt"?"レシートの写真を選ぶ":"食材・パッケージの写真を選ぶ"}</div></div>
                  }
                </div>
                <input ref={updateFridgeRef} type="file" accept="image/*" style={{display:"none"}} onChange={e => handleUpdateScan(e,"fridge")}/>
                <input ref={receiptRef} type="file" accept="image/*" style={{display:"none"}} onChange={e => handleUpdateScan(e,"receipt")}/>
                <input ref={singleRef} type="file" accept="image/*" style={{display:"none"}} onChange={e => handleUpdateScan(e,"single")}/>
                {updateLoading && <div style={S.loadingRow}><div style={S.spinnerOrange} className="spin"/><span style={{color:"#e08c3a",fontSize:13}}>読み取り中...</span></div>}
              </>
            )}
            {updatePreview && !updateLoading && (
              <div className="fade-in">
                <div style={S.backRow}>
                  <button style={S.backBtn} onClick={() => { setUpdatePreview(null); setUpdateImage(null); }}>← やり直す</button>
                  <span style={{color:"#888",fontSize:13}}>{updatePreview.length}件を読み取りました</span>
                </div>
                <div style={S.previewList}>
                  {updatePreview.map((item,idx) => (
                    <div key={idx} style={S.previewRow}>
                      <input style={S.warmInput} value={item.name} placeholder="食材名" onChange={e => updatePreviewItem(idx,"name",e.target.value)}/>
                      <CategoryPicker value={item.category} onChange={v => updatePreviewItem(idx,"category",v)}/>
                      <ExpiryPicker value={item.expiry} onChange={v => updatePreviewItem(idx,"expiry",v)}/>
                    </div>
                  ))}
                </div>
                <button style={S.mainBtn} onClick={confirmUpdate} className="main-btn">在庫に追加する（{updatePreview.filter(i=>i.name).length}件）</button>
              </div>
            )}
            <div style={{marginTop:24}}>
              <div style={{...S.sectionTitle,marginBottom:12}}>いまの在庫（{inventory.length}件）</div>
              {inventory.length===0
                ? <div style={S.emptyState}>まだ食材が登録されていません</div>
                : <>
                    {inventory.filter(i => { const d=daysUntil(i.expiry); return d!==null&&d<=1; }).length>0 && (
                      <div style={S.expiryWarningBox} className="fade-in">
                        <div style={S.expiryWarningTitle}>⚠️ もうすぐ期限切れ！早めに使って</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:8}}>
                          {inventory.filter(i => { const d=daysUntil(i.expiry); return d!==null&&d<=1; }).sort((a,b) => new Date(a.expiry)-new Date(b.expiry)).map(i => (
                            <div key={i.id} style={S.expiryChip}>
                              <span style={S.expiryChipName}>{i.name}</span>
                              <span style={S.expiryChipDays}>{daysUntil(i.expiry)<=0?"期限切れ":`あと${daysUntil(i.expiry)}日`}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
                      {["すべて", ...CATEGORIES].map(cat => {
                        const count = cat==="すべて" ? inventory.length : inventory.filter(i => (i.category||"冷蔵")===cat).length;
                        if (cat !== "すべて" && count === 0) return null;
                        const selected = categoryTab === cat;
                        return (
                          <button key={cat}
                            style={{background:selected?"#e08c3a":"#faf0e6",border:`1.5px solid ${selected?"#e08c3a":"#f0d8b8"}`,borderRadius:20,padding:"4px 12px",fontSize:12,color:selected?"#fff":"#888",cursor:"pointer",fontFamily:"inherit"}}
                            onClick={() => setCategoryTab(cat)}>
                            {cat==="すべて" ? "📋" : CATEGORY_ICONS[cat]} {cat}（{count}）
                          </button>
                        );
                      })}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {[...inventory]
                        .filter(i => categoryTab==="すべて" || (i.category||"冷蔵")===categoryTab)
                        .sort((a,b) => { if(!a.expiry) return 1; if(!b.expiry) return -1; return new Date(a.expiry)-new Date(b.expiry); }).map(item => {
                        const isEditing = editingId===item.id;
                        return (
                          <div key={item.id} style={S.inventoryRow}>
                            <div style={{flex:1}}>
                              {isEditing ? (
                                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                                  <input style={S.warmInput} value={item.name} onChange={e => updateItem(item.id,"name",e.target.value)}/>
                                  <CategoryPicker value={item.category} onChange={v => updateItem(item.id,"category",v)}/>
                                  <ExpiryPicker value={item.expiry} onChange={v => updateItem(item.id,"expiry",v)}/>
                                </div>
                              ) : (
                                <>
                                  <div style={S.itemName}>
                                    <span style={{fontSize:13,marginRight:6}}>{CATEGORY_ICONS[item.category||"冷蔵"]}</span>
                                    {item.name}
                                    {item.note && <span style={{fontSize:11,color:"#aaa",marginLeft:6}}>（{item.note}）</span>}
                                  </div>
                                  {item.expiry && <div style={{fontSize:12,color:expiryColor(item.expiry),marginTop:2}}>{expiryLabel(item.expiry)}</div>}
                                </>
                              )}
                            </div>
                            <div style={{display:"flex",gap:6}}>
                              <button style={S.iconBtn} onClick={() => setEditingId(isEditing?null:item.id)}>{isEditing?"✓":"✏️"}</button>
                              <button style={{...S.iconBtn,color:"#e05c5c"}} onClick={() => removeItem(item.id)}>✕</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </>
              }
            </div>
          </div>
        )}

        {screen==="settings" && (
          <div className="fade-in">
            <div style={S.sectionTitle}>⚙️ 設定</div>
            <div style={S.settingCard}>
              <div style={S.settingLabel}>👨‍👩‍👧 デフォルトの人数</div>
              <div style={S.peopleRow}>
                <button style={S.peopleBtn} onClick={() => setPeople(p => Math.max(1,p-1))}>－</button>
                <div style={S.peopleNum}>{people}<span style={S.peopleUnit}>人分</span></div>
                <button style={S.peopleBtn} onClick={() => setPeople(p => p+1)}>＋</button>
              </div>
            </div>
            <div style={S.settingCard}>
              <div style={S.settingLabel}>📝 家族構成・食の好み</div>
              <textarea style={S.warmTextarea} placeholder={"例：大人2人・子ども1人（5歳）。辛いものはNG。魚料理が好き。"} value={familyNote} onChange={e => setFamilyNote(e.target.value)} rows={4}/>
              <div style={{color:"#aaa",fontSize:11,marginTop:-8}}>献立を提案するときに自動で考慮します</div>
            </div>
            <button style={{...S.mainBtn,background:"#f0ebe3",color:"#c0392b",marginTop:8}} onClick={() => { setInvRaw([]); setScreen("fridge"); }}>
              最初からやり直す（在庫をリセット）
            </button>
          </div>
        )}

      </div>
      {consumeModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}} onClick={() => !consumeModal.loading && setConsumeModal(null)}>
          <div style={{width:"100%",maxWidth:480,background:"#fff",borderRadius:"20px 20px 0 0",padding:"20px 20px 100px",maxHeight:"80vh",overflowY:"auto"}} onClick={e => e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:700,color:"#333",marginBottom:4}}>🍽️ お疲れさま！</div>
            <div style={{fontSize:13,color:"#888",marginBottom:16}}>使った食材を確認してください</div>
            {consumeModal.loading ? (
              <div style={S.loadingRow}><div style={S.spinnerOrange} className="spin"/><span style={{color:"#e08c3a",fontSize:13}}>使用量を予測中...</span></div>
            ) : consumeModal.items?.length === 0 ? (
              <div style={{color:"#aaa",fontSize:13,textAlign:"center",padding:"24px 0"}}>
                在庫から使った食材はないみたいです
                <button style={{...S.mainBtn,marginTop:16}} onClick={() => setConsumeModal(null)} className="main-btn">閉じる</button>
              </div>
            ) : (
              <>
                <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
                  {consumeModal.items.map((it,idx) => (
                    <div key={idx} style={{background:"#faf8f4",borderRadius:12,padding:"12px 14px"}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#333",marginBottom:2}}>{it.name}</div>
                      <div style={{fontSize:11,color:"#aaa",marginBottom:8}}>AI予測：{it.used}</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {["全部使った","少し残った","半分残った","ほぼ残ってる"].map(opt => {
                          const selected = it.remain === opt;
                          return (
                            <button key={opt}
                              style={{background:selected?"#e08c3a":"#fff",border:`1.5px solid ${selected?"#e08c3a":"#f0d8b8"}`,borderRadius:20,padding:"4px 12px",fontSize:11,color:selected?"#fff":"#888",cursor:"pointer",fontFamily:"inherit"}}
                              onClick={() => setConsumeModal(m => ({...m, items: m.items.map((x,i) => i===idx?{...x,remain:opt}:x)}))}>
                              {opt}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
                <button style={S.mainBtn} onClick={confirmConsume} className="main-btn">在庫を更新する</button>
                <button style={S.skipLink} onClick={() => setConsumeModal(null)}>キャンセル</button>
              </>
            )}
          </div>
        </div>
      )}
      <TabBar/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
