// ─── SOUND ───────────────────────────────────────────────────────────────────

const SFX = (() => {
  let ctx = null;
  let sizzleNodes = null; // {source, gain} for looping sizzle
  let unlocked = false;
  // Silent audio element for iOS PWA unlock
  const silentAudio = document.createElement("audio");
  silentAudio.setAttribute("playsinline",""); silentAudio.src = "data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA/+MYxAAAAAANIAAAAAExBTUUzLjEwMFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV";

  const init = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    // iOS PWA unlock: play silent audio + resume context
    if (!unlocked) {
      unlocked = true;
      silentAudio.play().catch(()=>{});
      silentAudio.pause();
      silentAudio.currentTime = 0;
    }
  };
  const enabled = () => { try { return localStorage.getItem("repi_sound_enabled") !== "false"; } catch { return true; } };
  const play = (fn) => { if (!enabled() || !ctx) return; try { if (ctx.state === "suspended") ctx.resume(); fn(ctx); } catch {} };

  return {
    init,
    tap: () => play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = "sine"; o.frequency.setValueAtTime(880, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(1320, c.currentTime+0.05);
      g.gain.setValueAtTime(0.1, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+0.08);
      o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+0.08);
    }),

    // ジュウジュウ持続ループ — フェードインで開始
    sizzleStart: () => play(c => {
      if (sizzleNodes) return; // already playing
      // ノイズバッファ生成（2秒ループ）
      const dur = 2, sr = c.sampleRate, buf = c.createBuffer(1, sr*dur, sr), d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        // 複数のノイズ帯域をミックスしてリアルなジュウジュウ感
        d[i] = (Math.random()*2-1) * 0.3;
        // 粒感を出すためにランダムにパチパチ
        if (Math.random() < 0.003) d[i] += (Math.random()-0.5) * 1.5;
      }
      const src = c.createBufferSource(); src.buffer = buf; src.loop = true;
      // バンドパスで油のジュウジュウ帯域を強調
      const bp = c.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 4000; bp.Q.value = 0.6;
      // ハイパスで低音カット
      const hp = c.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 1500;
      const gain = c.createGain();
      gain.gain.setValueAtTime(0, c.currentTime);
      gain.gain.linearRampToValueAtTime(0.08, c.currentTime+0.5); // fade in
      src.connect(bp); bp.connect(hp); hp.connect(gain); gain.connect(c.destination);
      src.start();
      sizzleNodes = {source: src, gain};
    }),

    // ジュウジュウ停止 — フェードアウト
    sizzleStop: () => {
      if (!sizzleNodes || !ctx) return;
      try {
        const {source, gain} = sizzleNodes;
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime+0.4);
        source.stop(ctx.currentTime+0.5);
      } catch {}
      sizzleNodes = null;
    },

    // 完成音：プシュー(蒸気) + チーン(ベル) の組み合わせ
    dishReady: () => play(c => {
      const t = c.currentTime;
      // 1) プシュー — 蒸気のホワイトノイズ、ハイパス
      const steamDur = 0.5, steamBuf = c.createBuffer(1, c.sampleRate*steamDur, c.sampleRate), sd = steamBuf.getChannelData(0);
      for (let i = 0; i < sd.length; i++) { sd[i] = (Math.random()*2-1) * Math.exp(-i/(c.sampleRate*0.15)) * 0.12; }
      const ss = c.createBufferSource(); ss.buffer = steamBuf;
      const shp = c.createBiquadFilter(); shp.type = "highpass"; shp.frequency.value = 5000;
      const sg = c.createGain(); sg.gain.setValueAtTime(0.15, t); sg.gain.exponentialRampToValueAtTime(0.001, t+0.5);
      ss.connect(shp); shp.connect(sg); sg.connect(c.destination); ss.start(t);

      // 2) チーン — 金属的なベル音（高周波サイン波 + 倍音）
      [1568, 2349, 3136].forEach((freq, i) => { // G6, D7, G7
        const o = c.createOscillator(), g = c.createGain();
        o.type = "sine"; o.frequency.value = freq;
        const onset = t + 0.08;
        g.gain.setValueAtTime(0, onset);
        g.gain.linearRampToValueAtTime(i===0 ? 0.12 : 0.05, onset+0.01);
        g.gain.exponentialRampToValueAtTime(0.001, onset + 0.8);
        o.connect(g); g.connect(c.destination);
        o.start(onset); o.stop(onset+0.8);
      });

      // 3) 明るいジングル（ドミソド↑、短い）
      [523, 659, 784, 1047].forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = "triangle"; o.frequency.value = freq;
        const onset = t + 0.15 + i*0.1;
        g.gain.setValueAtTime(0, onset);
        g.gain.linearRampToValueAtTime(0.08, onset+0.02);
        g.gain.exponentialRampToValueAtTime(0.001, onset+0.25);
        o.connect(g); g.connect(c.destination);
        o.start(onset); o.stop(onset+0.25);
      });
    }),
  };
})();

const getUserId = () => {
  let uid = localStorage.getItem("rsp_uid");
  if (!uid) { uid = "user_" + Math.random().toString(36).slice(2) + Date.now(); localStorage.setItem("rsp_uid", uid); }
  return uid;
};

const sbFetch = async (path, options = {}) => {
  const res = await fetch(path, { headers: {"Content-Type":"application/json"}, ...options });
  return res.json();
};

const loadInventory = async () => {
  try {
    const uid = getUserId();
    const data = await sbFetch(`/api/inventory?user_id=${uid}`);
    return Array.isArray(data) ? data.map(i => ({...i, id: i.id})) : [];
  } catch { return []; }
};

const saveItem = async (item) => {
  const uid = getUserId();
  try {
    const data = await sbFetch("/api/inventory", {
      method: "POST",
      body: JSON.stringify({user_id: uid, name: item.name, expiry: item.expiry || null, category: item.category || "冷蔵", ...(item.quantity != null && item.quantity !== "" ? {quantity: Number(item.quantity)} : {}), ...(item.display ? {display: item.display} : {}), ...(item.memo ? {memo: item.memo} : {}), ...(item.fromFlyer ? {from_flyer: true} : {})}),
    });
    return Array.isArray(data) ? data[0] : data;
  } catch { return null; }
};

const deleteItem = async (id) => {
  try { await sbFetch(`/api/inventory?id=${id}`, {method:"DELETE"}); } catch {}
};

const updateItemDb = async (id, fields) => {
  try { await sbFetch(`/api/inventory?id=${id}`, {method:"PATCH", body: JSON.stringify(fields)}); } catch {}
};

// ─── ポイント ─────────────────────────────────────────────────────────────────

const loadPoints = async () => {
  try {
    const uid = getUserId();
    const data = await sbFetch(`/api/points?user_id=${uid}`);
    if (data && typeof data.balance === "number") return data.balance;
    return 0;
  } catch { return 0; }
};

const addPoints = async (amount) => {
  try {
    const uid = getUserId();
    const data = await sbFetch("/api/points", {
      method: "POST",
      body: JSON.stringify({user_id: uid, amount}),
    });
    if (data && typeof data.balance === "number") return data.balance;
    return null;
  } catch { return null; }
};

// ─── 引き継ぎコード ───────────────────────────────────────────────────────────

const generateTransferCode = () => {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // 紛らわしい文字(I,O,0,1)を除外
  const block = () => Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join("");
  return `RCP-${block()}-${block()}`;
};

const issueTransferCode = async () => {
  const uid = getUserId();
  for (let i = 0; i < 5; i++) { // 万一衝突した場合のリトライ
    const code = generateTransferCode();
    try {
      const data = await sbFetch("/api/transfer", {
        method: "POST",
        body: JSON.stringify({code, user_id: uid}),
      });
      if (data && data.code) return data.code;
    } catch {}
  }
  return null;
};

const redeemTransferCode = async (code) => {
  try {
    const normalized = code.trim().toUpperCase();
    const data = await sbFetch(`/api/transfer?code=${encodeURIComponent(normalized)}`);
    if (data && data.user_id) return data.user_id;
    return null;
  } catch { return null; }
};

const getTopInventory = (inv, limit=20) => {
  return [...inv].sort((a,b) => {
    const ea = a.expiry ? new Date(a.expiry).getTime() : Infinity;
    const eb = b.expiry ? new Date(b.expiry).getTime() : Infinity;
    if (ea !== eb) return ea - eb;
    const qa = a.quantity || 0, qb = b.quantity || 0;
    if (qa !== qb) return qb - qa;
    return 0;
  }).slice(0, limit);
};

// display文字列 → {quantity, unit} に変換
const parseDisplay = (d) => {
  if (!d) return {quantity:null, unit:null};
  const s = d.trim();
  // "1/2個" "1/4玉" etc
  const frac = s.match(/^(\d+)\/(\d+)\s*(.+)?$/);
  if (frac) return {quantity: parseInt(frac[1])/parseInt(frac[2]), unit: frac[3]||"個"};
  // "1個半" "2個半"
  const half = s.match(/^(\d+)\s*(.+)半$/);
  if (half) return {quantity: parseFloat(half[1])+0.5, unit: half[2]};
  // "葉2枚" "葉4枚"
  const leaf = s.match(/^葉(\d+)\s*枚$/);
  if (leaf) return {quantity: parseInt(leaf[1]), unit: "枚"};
  // "200g" "100ml"
  const metric = s.match(/^(\d+(?:\.\d+)?)\s*(g|kg|ml|cc)$/i);
  if (metric) return {quantity: parseFloat(metric[1]), unit: metric[2].toLowerCase()};
  // "小さじ1" "大さじ2"
  const spoon = s.match(/^(小さじ|大さじ)\s*(\d+(?:\/\d+)?)$/);
  if (spoon) { const v = spoon[2].includes("/")?eval(spoon[2]):parseFloat(spoon[2]); return {quantity:v, unit:spoon[1]}; }
  // "1個" "2本" "3切れ"
  const num = s.match(/^(\d+(?:\.\d+)?)\s*(.*)$/);
  if (num) return {quantity: parseFloat(num[1]), unit: num[2]||"個"};
  return {quantity:null, unit:null};
};

const DebouncedInput = ({ value, onSave, style, placeholder, multiline, rows }) => {
  const [local, setLocal] = React.useState(value || "");
  const composing = React.useRef(false);
  React.useEffect(() => { setLocal(value || ""); }, [value]);
  const props = {
    style, placeholder, value: local,
    onChange: e => setLocal(e.target.value),
    onCompositionStart: () => { composing.current = true; },
    onCompositionEnd: e => { composing.current = false; onSave(e.target.value); },
    onBlur: () => { if (!composing.current && local !== value) onSave(local); },
  };
  if (multiline) return <textarea {...props} rows={rows||2}/>;
  return <input {...props} onKeyDown={e => { if (e.key === "Enter" && !composing.current) { e.target.blur(); } }}/>;
};

// レシピ本文を「セクション」に分解してきれいに表示
const ParsedRecipe = ({ content }) => {
  // 主菜・副菜・汁物のセクションに分割（または1品料理本体）
  // 献立セット形式：🥘 主菜：...\n📋 材料\n...\n👨‍🍳 作り方\n...
  const sections = [];
  const lines = content.split(/\r?\n/);
  let current = null;
  let mode = null; // "ingredients" | "steps" | "comment" | null

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    // セット内の料理見出し
    if (/^(🥘|🥗|🍲)\s*(主菜|副菜|汁物)\s*[:：]/.test(line)) {
      if (current) sections.push(current);
      current = { kind: "dish", header: line, ingredients: [], steps: [] };
      mode = null;
      continue;
    }
    // 材料セクションへ
    if (/^📋|^材料/.test(line)) {
      if (!current) current = { kind: "single", header: null, ingredients: [], steps: [] };
      mode = "ingredients";
      continue;
    }
    // 作り方セクションへ
    if (/^👨‍🍳|^作り方/.test(line)) {
      if (!current) current = { kind: "single", header: null, ingredients: [], steps: [] };
      mode = "steps";
      continue;
    }
    // コメント
    if (/^💬/.test(line)) {
      if (current) { current.comment = line.replace(/^💬\s*/, ""); }
      mode = "comment";
      continue;
    }
    // 食材行
    if (mode === "ingredients" && /^[・·•]/.test(line)) {
      const m = line.replace(/^[・·•]\s*/, "").split(/\s*\.{2,}\s*|\s+\.\.\.\s+|\s{2,}/);
      const name = m[0] || line.replace(/^[・·•]\s*/, "");
      const qty = m.slice(1).join(" ").trim();
      if (!current) current = { kind: "single", header: null, ingredients: [], steps: [] };
      current.ingredients.push({ name: name.trim(), qty });
      continue;
    }
    // 手順行
    if (mode === "steps" && /^[①②③④⑤⑥⑦⑧⑨⑩]/.test(line)) {
      if (!current) current = { kind: "single", header: null, ingredients: [], steps: [] };
      current.steps.push(line);
      continue;
    }
    // メタ情報（時間・カロリー・合計時間など）はスキップ表示
  }
  if (current) sections.push(current);

  if (sections.length === 0) {
    // パースに失敗したら生テキストフォールバック
    return <div style={{fontSize:13,color:"#5a4a3a",lineHeight:2.1,whiteSpace:"pre-wrap"}}>{content.replace(/【[^】]+】/,"").trim()}</div>;
  }

  return (
    <div>
      {sections.map((sec, i) => (
        <div key={i} style={{marginBottom:i < sections.length - 1 ? 22 : 4}}>
          {sec.header && (
            <div style={{fontSize:15,fontWeight:700,color:"#5a4a3a",marginBottom:12,fontFamily:"'Kaisei Decol',serif"}}>
              {sec.header}
            </div>
          )}
          {sec.ingredients.length > 0 && (
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:"#8a7563",marginBottom:8,letterSpacing:"0.08em"}}>📋 材料</div>
              <div style={{background:"#fdf9f0",borderRadius:12,padding:"12px 16px"}}>
                {sec.ingredients.map((ing, j) => (
                  <div key={j} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"5px 0",borderBottom:j < sec.ingredients.length - 1 ? "1px dashed #f0e0c8" : "none",fontSize:13,color:"#5a4a3a"}}>
                    <span>{ing.name}</span>
                    {ing.qty && <span style={{color:"#8a7563",fontWeight:600,fontSize:12}}>{ing.qty}</span>}
                  </div>
                ))}
              </div>
            </div>
          )}
          {sec.steps.length > 0 && (
            <div style={{marginBottom:sec.comment ? 12 : 0}}>
              <div style={{fontSize:12,fontWeight:700,color:"#8a7563",marginBottom:8,letterSpacing:"0.08em"}}>👨‍🍳 作り方</div>
              <div>
                {sec.steps.map((step, j) => (
                  <div key={j} style={{display:"flex",gap:10,marginBottom:8,fontSize:13,color:"#5a4a3a",lineHeight:1.7}}>
                    <span style={{flexShrink:0,fontSize:14,fontWeight:700,color:"#d67850"}}>{step.match(/^[①②③④⑤⑥⑦⑧⑨⑩]/)?.[0] || ""}</span>
                    <span style={{flex:1}}>{step.replace(/^[①②③④⑤⑥⑦⑧⑨⑩]\s*/, "")}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {sec.comment && (
            <div style={{background:"#fff5ea",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#8a6d3a",lineHeight:1.7,fontStyle:"italic"}}>
              💬 {sec.comment}
            </div>
          )}
        </div>
      ))}
    </div>
  );
};

      const ingLines = shareTargetContent.match(/^[・·•].+/gm) || [];

      const tipMatch = shareTargetContent.match(/【ポイント】(.+)/);

      if (ingNames.length > 0) text += `\n【材料】${ingNames.join("、")}\n`;
      if (tip) text += `【コツ】${tip}\n`;
      if (comment) text += `\n${comment}\n`;

    }).filter(Boolean).map(n => `・${n}`).join("\n");

  const doShare = async (target) => {
    const text = getShareText();
    const type = sharePhoto ? "made" : "menu";

    // 写真がある場合 → navigator.share で写真付きシェア
    if (sharePhoto && navigator.canShare) {
      try {
        const shareData = { text, files: [sharePhoto] };
        if (navigator.canShare(shareData)) {
          await navigator.share(shareData);
        } else {
          // filesが共有不可ならテキストのみ
          await navigator.share({ text });
        }
      } catch(e) { if (e.name !== "AbortError") console.error("share error:", e); }
    } else if (target === "x") {
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, "_blank");
    } else if (target === "instagram") {
      navigator.clipboard?.writeText(text);
      setPointToast({amount: 0, reason: "テキストをコピーしました。Instagramに貼り付けてね"});
      setTimeout(() => setPointToast(null), 3000);
      setTimeout(() => { try { window.open("instagram://", "_blank"); } catch {} }, 500);

      }
    } catch {}

    if (shareCookedId) {
      try {

      } catch {}
    }
    setShareLoading(false);
    setShareMenu(false); setShareTargetTitle(""); setShareTargetContent(""); setShareCookedId(null);

  const sharePhotoRef = useRef();


  // ─── レシピ保存 ─────────────────────────────────────────────────
  const getRecipeName = (content) => {

    return m ? m[1].trim() : "レシピ";
  };
  const isRecipeSaved = (content) => savedRecipes.some(r => r.recipe_name === getRecipeName(content));

    const existing = savedRecipes.find(r => r.recipe_name === name);

      setPointToast({amount:0, reason:"保存を解除しました"}); setTimeout(()=>setPointToast(null),2000);
    } else {
      const uid = getUserId();
      const data = await sbFetch("/api/recipes", {method:"POST", body: JSON.stringify({user_id: uid, recipe_name: name, recipe_data: {content}})});
      if (Array.isArray(data) && data[0]) setSavedRecipes(prev => [data[0], ...prev]);
      setPointToast({amount:0, reason:"📌 保存しました（設定→保存レシピで確認できます）"}); setTimeout(()=>setPointToast(null),2500);

  // ─── これを作る ────────────────────────────────────────────────
  const handleCook = async (title, content) => {

  const confirmCook = async () => {
    if (!cookConfirm || cookingInProgress) return;
    setCookingInProgress(true);
    const {title, content} = cookConfirm;
    let items = [];
    try {
      if (inventory.length > 0) {
        const raw = await callClaude(PROMPT_CONSUME(content, inventory, people), [{role:"user",content:[{type:"text",text:"JSONのみで返答してください。"}]}]);

        const consumed = jsonMatch ? JSON.parse(jsonMatch[0]) : [];
        // AIの推定をlevel 1(少なめ)/2(標準)/3(多め)に変換、action=keepは除外
        items = (Array.isArray(consumed)?consumed:[]).filter(it => {
          const inv = inventory.find(i => String(i.id) === String(it.id));
          return !!inv;
        }).map(it => ({...it, level: 2})); // デフォルトは「標準」
      }
    } catch(e) { console.error("消費予測エラー:", e); }
    setCookingInProgress(false);
    setCookConfirm(null);
    // 在庫調整確認モーダルを表示（アイテムがあれば）
    setInvReview({title, content, items}); setInvReviewDetail(false);
  };

  const applyInventoryReview = async () => {
    if (!invReview) return;
    const {title, content, items} = invReview;
    const consumedArr = [];
    for (const it of items) {
      try {
        if (it.skip) continue; // 「結局使わず」
        const inv = inventory.find(i => String(i.id) === String(it.id));
        if (!inv) continue;
        if (it.deleteAll) {
          // 「使い切った」→ 完全削除
          await deleteItem(it.id);
          consumedArr.push({...it, action:"delete"});
          continue;
        }
        if (it.customEdit && it.customQty != null) {
          const reduceBy = it.customQty;
          if (inv.quantity != null) {
            const newQty = inv.quantity - reduceBy;
            if (newQty <= 0) { await deleteItem(it.id); } else { await updateItemDb(it.id, {quantity: newQty}); }
          } else { await deleteItem(it.id); }
          consumedArr.push({...it, reduce_by: reduceBy});
          continue;
        }
        // デフォルト: AI推定のaction
        if (it.action === "delete") {
          await deleteItem(it.id); consumedArr.push(it);
        } else if (it.action === "reduce") {
          const reduceBy = it.reduce_by || 1;
          if (inv.quantity != null) {
            const newQty = inv.quantity - reduceBy;
            if (newQty <= 0) { await deleteItem(it.id); } else { await updateItemDb(it.id, {quantity: newQty}); }
          } else { await deleteItem(it.id); }
          consumedArr.push({...it, reduce_by: reduceBy});
        }
      } catch {}
    }
    const freshInv = await loadInventory();
    setInvRaw(freshInv);
    setInvReview(null); setInvReviewDetail(false);
    try {
      const uid = getUserId();
      const cookedRes = await sbFetch("/api/cooked", {method:"POST", body: JSON.stringify({user_id: uid, recipe_name: title, recipe_data: {content}, ingredients_consumed: consumedArr})});
      const cookedId = Array.isArray(cookedRes) && cookedRes[0] ? cookedRes[0].id : null;
      setFeedbackModal({cookedId, title, content});
      setFeedbackRating(null); setFeedbackComment("");
    } catch(e) { setPointToast({amount:0, reason:"記録に失敗しました"}); setTimeout(()=>setPointToast(null),3000); }
    setInvReview(null);
  };

  const submitFeedback = async () => {
    if (feedbackModal?.cookedId) {

      await sbFetch(`/api/cooked?id=${feedbackModal.cookedId}`, {method:"PATCH", body: JSON.stringify(patch)}).catch(()=>{});
      awardPoints(5, "フィードバックありがとう！");
    }
    setFeedbackModal(null);
  };


  const handleIssueCode = async () => {
    setIssuingCode(true);
    const code = await issueTransferCode();
    setIssuingCode(false);
    if (code) setIssuedCode(code);
    else setIssuedCode("ERROR");
  };

    const code = redeemInput.trim().toUpperCase();
    if (!code) { setRedeemError("コードを入力してください"); return; }
    setRedeeming(true);
    setRedeemError("");
    const newUid = await redeemTransferCode(code);
    setRedeeming(false);

    setInvRaw(n);
  };

  const addToInventory = async (items) => {

    setInvRaw(prev => [...prev, ...valid]);
  };

    setInvRaw(prev => prev.filter(i => i.id !== id));
  };

    if (field === "quantity" && value <= 0) {
      await deleteItem(id);
      setInvRaw(prev => prev.filter(i => i.id !== id));
      return;
    }
    await updateItemDb(id, {[field]: value});
    setInvRaw(prev => prev.map(i => i.id===id?{...i,[field]:value}:i));
  };

  const setPeople = v => { const n = typeof v==="function"?v(people):v; setPplRaw(n); try{localStorage.setItem("rsp_ppl",JSON.stringify(n));}catch{} };
  const setFamilyNote = v => { setFamRaw(v); try{localStorage.setItem("rsp_fam",JSON.stringify(v));}catch{} };

  const [fridgeImages, setFridgeImages] = useState([]);
  const [fridgeLoading, setFridgeLoading] = useState(false);

  const [shopImages, setShopImages] = useState([]); // [{url, b64}]

  const [gachaAnim, setGachaAnim] = useState(false);
  const [altOpen, setAltOpen] = useState(false);
  const setGachaMode = v => { setGachaModeRaw(v); try{localStorage.setItem("rsp_gacha_mode",JSON.stringify(v));}catch{} };
  const [result, setResult] = useState(null);

    })); } catch {}
  };
  const restoreAnalysis = () => {

  const shopRef = useRef();

    try {

  const analyze = async (mode, comment) => {
    SFX.sizzleStart();
    setGachaAnim(true);
    setResultLoading(true);

    // 食事タイム指示を生成
    const mealTimeHints = {
      breakfast: "朝ごはん向け（15分以内、簡単、卵・パン・ご飯物中心、健康志向）",
      lunch: "昼ごはん向け（30分以内、軽め、お弁当転用可）",

      simple: "1品で完結するメニュー（丼物、パスタ、炒め物、鍋、カレー等）。品数少なく調理シンプル。",

      hearty: "主菜1品＋副菜1〜2品＋汁物の定食スタイル。食べ応え重視、彩り考慮。",
    };
    let mealTimeExtra = "";
    const selected = Array.from(mealTimes);
    if (selected.length === 0) {

      mealTimeExtra = mealTimeHints[auto];
    } else if (selected.length === 1) {
      mealTimeExtra = mealTimeHints[selected[0]];
    } else {
      const labels = {breakfast:"🌅朝ごはん",lunch:"☀️昼ごはん",dinner:"🌙夜ごはん"};
      const mealList = selected.map(k => labels[k]).join("・");
      mealTimeExtra = `【重要】${mealList}の${selected.length}食分を、それぞれ別のレシピとして提案してください。各食事は「🌅朝ごはん：」「☀️昼ごはん：」「🌙夜ごはん：」のラベルを料理名の前に付けること。食材リレー（前の食事の残りを活用）を意識してください。`;
      if (selected.includes("breakfast") && selected.includes("lunch") && !selected.includes("dinner")) {
        mealTimeExtra += " ブランチ（朝昼兼用）1品にまとめる案も可。";
      }
    }
    const allExtras = [mealTimeExtra, volumeHints[volumeType]||"", extras, comment].filter(Boolean).join("、");
    // ログ記録
    const uid = getUserId();
    const chipList = extras ? extras.split("、").filter(Boolean) : [];
    sbFetch("/api/admin/log", {method:"POST", body: JSON.stringify({table:"analyze_logs", data:{user_id:uid, mode:appMode, gacha_mode:mode, volume_type:volumeType, chips:extras||null}})}).catch(()=>{});
    if (chipList.length > 0) sbFetch("/api/admin/log", {method:"POST", body: JSON.stringify({table:"chip_logs", data:{user_id:uid, chips:chipList}})}).catch(()=>{});
    try {
      let sysPrompt, content;
      if (appMode === "meal_prep") {
        const isFridgeOnly = mode === "fridge";
        sysPrompt = PROMPT_MEAL_PREP(
          isFridgeOnly ? inventory : inventory,
          isFridgeOnly ? "※在庫にある食材だけで作れる作り置きを提案してください。" : (shopText || "特売・値引き情報なし"),
          people, familyNote, allExtras, prepDays
        );
        content = [{type:"text",text:`${prepDays}日分の作り置きおかず3品を提案してください。`}];
      } else if (mode === "free") {
        const vMode = volumeType === "hearty" ? "set" : "single";
        sysPrompt = PROMPT_FREE(people, familyNote, allExtras, vMode);
        const userText = vMode === "set"
          ? "在庫に関係なく、新しい「主菜＋副菜＋汁物」の献立セットを3案提案してください。"
          : "在庫に関係なく、新しい1品料理を3つ提案してください。";
        content = [{type:"text",text:userText}];
      } else {
        const isFridgeOnly = mode === "fridge";
        const vMode = volumeType === "hearty" ? "set" : "single";
        const promptFn = vMode === "set" ? PROMPT_KONDATE_SET : PROMPT_KONDATE_SINGLE;
        sysPrompt = isFridgeOnly
          ? promptFn(inventory, "※在庫にある食材だけで作れる献立を提案してください。買い物不要のものだけ。", people, familyNote, allExtras)
          : promptFn(inventory, shopText || "特売・値引き情報なし", people, familyNote, allExtras);
        const userText = vMode === "set"
          ? (isFridgeOnly ? "在庫にある食材で作れる「主菜＋副菜＋汁物」の献立セットを3案提案してください。" : "在庫と特売情報から「主菜＋副菜＋汁物」の献立セットを3案提案してください。")
          : (isFridgeOnly ? "在庫にある食材だけで1品料理を3つ提案してください。" : "在庫と特売情報から1品料理を3つ提案してください。");
        content = !isFridgeOnly && shopImages.length > 0
          ? [...shopImages.map(img => ({type:"image",source:{type:"base64",media_type:"image/jpeg",data:img.b64}})),{type:"text",text:`チラシ写真${shopImages.length}枚。このチラシに載っている特売食材を積極的に使った献立を提案してください。補足：${shopText||"なし"}\n\n${userText}`}]
          : [{type:"text",text:userText}];
      }
      const text = await callClaude(sysPrompt, [{role:"user",content}]);
      await new Promise(r => setTimeout(r, 1200));
      setResult(text);
      const parsedBlocks = text.split(/(?=【(?:献立セット)?[①②③])/).filter(b => b.match(/【(?:献立セット)?[①②③]/));
      setRecipes(parsedBlocks);
      // 作り置きモード：食べる順＋リメイクを抽出
      let mpExtra = null;
      if (appMode === "meal_prep") {
        const eatingPlan = text.match(/💡 食べる順のおすすめ[\s\S]*?(?=🛒|$)/)?.[0]?.trim() || null;
        mpExtra = { eatingPlan };
        setMealPrepExtra(mpExtra);
      }
      saveAnalysis(text, parsedBlocks, mode, mpExtra);
      SFX.sizzleStop(); SFX.dishReady();
      setScreen("result");
    } catch(err) { SFX.sizzleStop(); setResult("エラー："+err.message); setScreen("result"); }
    setResultLoading(false);
    setGachaAnim(false);
  };


  const handleUpdateScan = async (e, type) => {
    const files = Array.from(e.target.files); if (!files.length) return;
    e.target.value = ""; // 同じファイル再選択を許可
    setUpdateLoading(true);
    try {
      const imgs = await Promise.all(files.map(async f => ({url: URL.createObjectURL(f), b64: await toBase64(f), name: f.name})));
      const allImgs = [...updateImages, ...imgs];
      setUpdateImages(allImgs);
      const prompt = type==="receipt"?PROMPT_RECEIPT:type==="single"?PROMPT_SINGLE:PROMPT_FRIDGE_SCAN;
      const content = [
        ...allImgs.map(img => ({type:"image",source:{type:"base64",media_type:"image/jpeg",data:img.b64}})),
        {type:"text",text:`今日は${today()}です。読み取ってください。`},
      ];
      const raw = await callClaude(prompt, [{role:"user",content}]);
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      const items = Array.isArray(parsed)?parsed:[parsed];
      // レシート・チラシ由来はfromFlyerフラグを付与
      if (type === "receipt") items.forEach(i => { i.fromFlyer = true; });
      setUpdatePreview(items);
    } catch { setUpdatePreview([]); }
    setUpdateLoading(false);
  };

  const confirmUpdate = async () => {
    const valid = updatePreview.filter(i => i.name?.trim());
    await addToInventory(valid);
    const mode = updateMode;
    setUpdatePreview(null); setUpdateImages([]); setUpdateMode(null);
    if (valid.length === 0) return;
    if (mode === "receipt") awardPoints(10, "お買い物お疲れ様〜✨");
    else awardPoints(1, "食材の登録ありがとう〜");
  };

  const removeItem = id => removeFromInventory(id);
  const updateItem = (id,f,v) => updateInInventory(id,f,v);
  const updatePreviewItem = (idx,f,v) => setUpdatePreview(p => p.map((it,i) => i===idx?{...it,[f]:v}:it));

  const TabBar = () => (
    <div style={S.tabBar}>
      {[{key:"home",icon:"🍳",label:"献立"},{key:"update",icon:"🧺",label:"在庫"},{key:"settings",icon:"⚙️",label:"設定"}].map(t => (
        <button key={t.key}
          style={{...S.tab,...(screen===t.key||(screen==="result"&&t.key==="home")?S.tabActive:{})}}
          onClick={() => { if(t.key==="home" && recipes.length>0) setScreen("result"); else setScreen(t.key); }}>
          <div style={S.tabIcon}>{t.icon}</div>
          <div>{t.label}</div>
        </button>
      ))}
    </div>
  );


  if (screen==="loading") return (
    <div style={{...S.root, justifyContent:"center", alignItems:"center", gap:16}}>
      <div style={{fontSize:36}}>🍽️</div>
      <div style={{color:"#d67850", fontSize:20, fontWeight:700, fontFamily:"'Kaisei Decol',serif", letterSpacing:"0.1em"}}>レピ</div>
      <div style={S.spinnerOrange} className="spin"/>
    </div>
  );

  return (
    <div style={S.root}>
      <div style={{...S.appHeader,justifyContent:"space-between"}}>
        <div style={{width:60}}/>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <div style={S.logoSmall}>🍳 レピ</div>
          <div style={{fontSize:9,color:"#b89f87",letterSpacing:"0.3em",fontWeight:700}}>REPI</div>
          <div style={{fontSize:10,color:"#c0ac98",letterSpacing:"0.08em",marginTop:1}}>AIおまかせごはん</div>
        </div>
        <button onClick={() => setScreen("pointHistory")} style={{width:60,background:"#fdecd8",border:"1px solid #f0d8b8",borderRadius:14,padding:"6px 10px",fontSize:12,fontWeight:700,color:"#d67850",cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
          🪙 {points}
        </button>
      </div>
      <div style={S.appContent}>

        {screen==="home" && (
          <div className="fade-in">
            <div style={{display:"flex",background:"#fdecd8",borderRadius:16,padding:4,marginBottom:16}}>
              {[{key:"daily",icon:"🍳",label:"今日ごはん"},{key:"meal_prep",icon:"🥡",label:"作り置き"},{key:"weekly_plan",icon:"📅",label:"週間プラン"}].map(m => (
                <button key={m.key} onClick={() => setAppMode(m.key)}
                  style={{flex:1,background:appMode===m.key?"#fff":"transparent",border:"none",borderRadius:12,padding:"10px 4px",cursor:"pointer",fontFamily:"inherit",boxShadow:appMode===m.key?"0 2px 6px rgba(214,120,80,0.15)":"none",transition:"all 0.2s"}}>
                  <div style={{fontSize:14,fontWeight:700,color:appMode===m.key?"#d67850":"#b89f87"}}>{m.icon} {m.label}</div>
                </button>
              ))}
            </div>
            <div style={S.peopleCard}>
              <div style={S.peopleLabel}>{appMode==="meal_prep"?"🥡 何人分？":"🍽️ 今日の人数"}</div>
              <div style={S.peopleRow}>
                <button style={S.peopleBtn} onClick={() => setPeople(p => Math.max(1,p-1))}>－</button>
                <div style={S.peopleNum}>{people}<span style={S.peopleUnit}>人分</span></div>
                <button style={S.peopleBtn} onClick={() => setPeople(p => p+1)}>＋</button>
              </div>
            </div>
            {appMode==="meal_prep" && (
              <div style={{...S.peopleCard,marginBottom:16}}>
                <div style={S.peopleLabel}>📅 何日分？</div>
                <div style={{display:"flex",gap:8}}>
                  {[2,3,4,5].map(d => (
                    <button key={d} onClick={() => setPrepDays(d)}
                      style={{background:prepDays===d?"#d67850":"#fdecd8",color:prepDays===d?"#fff":"#8a7563",border:"none",borderRadius:12,padding:"8px 18px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"}}>
                      {d}日
                    </button>
                  ))}
                </div>
              </div>
            )}
            {appMode==="weekly_plan" && (
              <div className="fade-in">
                <div style={{...S.peopleCard,marginBottom:14,flexDirection:"column",alignItems:"stretch",gap:12}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:"#5a4a3a",marginBottom:6}}>📅 何日分？</div>
                    <div style={{display:"flex",gap:6}}>
                      {[3,5,7].map(d => (
                        <button key={d} onClick={() => setWpDays(d)}
                          style={{flex:1,background:wpDays===d?"#d67850":"#fdecd8",color:wpDays===d?"#fff":"#8a7563",border:"none",borderRadius:12,padding:"10px 4px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{d}日</button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:"#5a4a3a",marginBottom:6}}>🍽️ 1食あたり何品？</div>
                    <div style={{display:"flex",gap:6}}>
                      {[1,2,3].map(d => (
                        <button key={d} onClick={() => setWpDishes(d)}
                          style={{flex:1,background:wpDishes===d?"#d67850":"#fdecd8",color:wpDishes===d?"#fff":"#8a7563",border:"none",borderRadius:12,padding:"10px 4px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{d}品</button>
                      ))}
                    </div>
                  </div>
                  <div>

                    <div style={{display:"flex",gap:6}}>

                        const sel = wpTimes.has(t.k);
                        return <button key={t.k} onClick={() => setWpTimes(prev => { const n=new Set(prev); if(n.has(t.k)) n.delete(t.k); else n.add(t.k); return n; })}

                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:"#5a4a3a",marginBottom:6}}>🧺 在庫モード</div>
                    <div style={{display:"flex",gap:6}}>

                        const sel = wpInvMode===m.k;
                        return <button key={m.k} onClick={() => setWpInvMode(m.k)}
                          style={{flex:1,background:sel?"#d67850":"#fdecd8",color:sel?"#fff":"#8a7563",border:"none",borderRadius:12,padding:"10px 4px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{m.icon} {m.l}</button>;
                      })}
                    </div>
                  </div>
                </div>
                <DebouncedInput multiline rows={2} style={S.warmTextarea} placeholder={"こだわり（任意）\n例：和食多め、魚中心、子ども向け"} value={wpPref} onSave={setWpPref}/>
                <button
                  style={{...S.mainBtn,marginBottom:16,opacity:wpLoading?0.6:1}}
                  className="main-btn"
                  disabled={wpLoading || wpTimes.size===0}
                  onClick={async () => {
                    SFX.sizzleStart(); setWpLoading(true);
                    try {
                      const times = Array.from(wpTimes).map(t => t==="breakfast"?"朝":t==="lunch"?"昼":"夜");
                      const prompt = PROMPT_WEEKLY_PLAN(wpDays, times, wpDishes, inventory, wpInvMode, wpPref, getSeasonalInfo(), shopText);
                      const raw = await callClaude(prompt, [{role:"user",content:[{type:"text",text:"JSONのみで返答してください。"}]}], 8000);
                      const jsonMatch = raw.replace(/```json|```/g,"").trim().match(/\{[\s\S]*\}/);
                      if (!jsonMatch) throw new Error("JSON not found");
                      const parsed = JSON.parse(jsonMatch[0]);
                      if (!parsed.plan) throw new Error("plan not found");
                      // DB保存
                      const startDate = parsed.plan[0]?.date || new Date().toISOString().split("T")[0];
                      const endDate = parsed.plan[parsed.plan.length-1]?.date || startDate;
                      await sbFetch("/api/weekly-plan", {method:"POST", body: JSON.stringify({
                        user_id: getUserId(), start_date: startDate, end_date: endDate,
                        config: {days:wpDays, dishes:wpDishes, times:Array.from(wpTimes), invMode:wpInvMode, pref:wpPref},
                        recipes: parsed
                      })});
                      setWpResult(parsed);
                      SFX.sizzleStop(); SFX.dishReady();
                    } catch(e) { console.error("weekly plan error:", e); SFX.sizzleStop(); setPointToast({amount:0,reason:`エラー: ${e.message?.slice(0,80)||"不明"}`}); setTimeout(()=>setPointToast(null),6000); }
                    setWpLoading(false);
                  }}>
                  {wpLoading ? <span><span className="egg-wobble">🥚</span> プラン作成中…</span> : `✨ ${wpDays}日分のプランを作る`}
                </button>
                {wpLoading && <div style={S.loadingRow}><span className="egg-wobble" style={{fontSize:18}}>🥚</span><span style={{color:"#d67850",fontSize:13}}>AIが{wpDays}日分考え中…</span></div>}
                {wpResult && (() => {
                  const timeLabels = {breakfast:"🌅 朝",lunch:"☀️ 昼",dinner:"🌙 夜"};
                  return (
                    <div>
                      <div style={{fontSize:16,fontWeight:700,color:"#5a4a3a",marginBottom:12,fontFamily:"'Kaisei Decol',serif"}}>
                        📅 {wpResult.plan[0]?.date}〜{wpResult.plan[wpResult.plan.length-1]?.date} のプラン
                      </div>
                      {wpResult.plan.map((day, di) => (
                        <div key={di} style={{marginBottom:14}}>
                          <div style={{fontSize:14,fontWeight:700,color:"#d67850",marginBottom:8}}>{day.date}（{day.day_name}）</div>
                          {Object.entries(day.meals||{}).map(([time, dishes]) => (
                            <div key={time} style={{marginBottom:10}}>
                              <div style={{fontSize:12,fontWeight:700,color:"#8a7563",marginBottom:4}}>{timeLabels[time]||time}</div>
                              {(Array.isArray(dishes)?dishes:[]).map((dish, mi) => (
                                <details key={mi} style={{background:"#fffcf7",border:"1.5px solid #f0e0c8",borderRadius:14,marginBottom:6,overflow:"hidden"}}>
                                  <summary style={{padding:"10px 14px",fontSize:13,fontWeight:700,color:"#5a4a3a",cursor:"pointer",listStyle:"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                    <span>• {dish.name}</span><span style={{fontSize:11,color:"#d67850"}}>詳細 ▼</span>
                                  </summary>
                                  <div style={{padding:"0 14px 12px"}}>
                                    {dish.ingredients && (
                                      <div style={{marginBottom:8}}>
                                        <div style={{fontSize:11,fontWeight:700,color:"#8a7563",marginBottom:4}}>📋 材料</div>
                                        {dish.ingredients.map((ing,j) => (
                                          <div key={j} style={{fontSize:12,color:"#5a4a3a",padding:"2px 0"}}>{ing.name} {ing.amount||""}</div>
                                        ))}
                                      </div>
                                    )}
                                    {dish.steps && (
                                      <div>
                                        <div style={{fontSize:11,fontWeight:700,color:"#8a7563",marginBottom:4}}>👨‍🍳 作り方</div>
                                        {dish.steps.map((s,j) => (
                                          <div key={j} style={{fontSize:12,color:"#5a4a3a",padding:"2px 0",lineHeight:1.6}}>{["①","②","③","④","⑤"][j]||"・"} {s}</div>
                                        ))}
                                      </div>
                                    )}
                                  </div>
                                </details>
                              ))}
                            </div>
                          ))}
                        </div>
                      ))}
                    </div>
                  );
                })()}
              </div>
            )}
            {inventory.length === 0 && appMode==="daily" && (
              <div style={{background:"linear-gradient(135deg,#fff5ea 0%,#fdf4e8 100%)",border:"1.5px solid #f0d8b8",borderRadius:24,padding:"22px 22px",marginBottom:16,boxShadow:"0 2px 14px rgba(214,120,80,0.08)"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#d67850",marginBottom:16,letterSpacing:"0.15em"}}>✨ はじめましての方へ</div>
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{background:"#d67850",color:"#fff",width:28,height:28,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0,boxShadow:"0 2px 6px rgba(214,120,80,0.25)"}}>1</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:700,color:"#5a4a3a"}}>🥕 食材を撮るだけ</div>
                      <div style={{fontSize:12,color:"#8a7563",marginTop:4,lineHeight:1.6}}>冷蔵庫やレシートを撮影するだけでOK</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{background:"#d67850",color:"#fff",width:28,height:28,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0,boxShadow:"0 2px 6px rgba(214,120,80,0.25)"}}>2</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:700,color:"#5a4a3a"}}>🍳 今日の献立、まかせて</div>
                      <div style={{fontSize:12,color:"#8a7563",marginTop:4,lineHeight:1.6}}>ある食材でぴったりの献立を提案</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{background:"#d67850",color:"#fff",width:28,height:28,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0,boxShadow:"0 2px 6px rgba(214,120,80,0.25)"}}>3</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:700,color:"#5a4a3a"}}>✨ レピ・ポイントも貯まる</div>
                      <div style={{fontSize:12,color:"#8a7563",marginTop:4,lineHeight:1.6}}>使うほどポイントが貯まってお得に✨</div>
                    </div>
                  </div>
                </div>
                <button
                  style={{...S.mainBtn,marginTop:20,marginBottom:0,width:"100%",fontSize:16,padding:"18px 0"}}
                  onClick={() => setScreen("update")}
                  className="main-btn">
                  📷 冷蔵庫やレシートを撮ってみる
                </button>
              </div>
            )}
            <div style={S.sectionTitle}>🧺 冷蔵庫の中身</div>
            <div style={S.inventoryCard} onClick={() => setScreen("update")}>
              {inventory.length===0
                ? <div style={S.inventoryEmpty}>まだからっぽだよ〜<br/><span style={{fontSize:12,color:"#c0ac98"}}>タップして食材を入れよう</span></div>
                : <>
                    <div style={S.inventoryChips}>
                      {[...inventory].sort((a,b) => { if(!a.expiry) return 1; if(!b.expiry) return -1; return new Date(a.expiry)-new Date(b.expiry); }).slice(0,8).map(i => (
                        <div key={i.id} style={{...S.chip,borderColor:expiryColor(i.expiry)}}>{i.name}{i.display ? ` ${i.display}` : i.quantity != null ? ` ×${i.quantity}` : ""}</div>
                      ))}
                      {inventory.length>8 && <div style={S.chipMore}>+{inventory.length-8}件</div>}
                    </div>
                    <div style={S.inventoryEditHint}>タップして編集 →</div>
                  </>
              }
            </div>
            <div style={S.sectionTitle}>🏷️ お得情報（あれば）</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div style={{...S.uploadBox,...(shopImages.length?S.uploadBoxFilled:{}),minHeight:80}} onClick={() => shopRef.current.click()} className="upload-box">
                {shopImages.length > 0
                  ? <div style={{padding:8,width:"100%"}}>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {shopImages.map((img,i) => (
                          <div key={i} style={{position:"relative",width:48,height:48}}>
                            <img src={img.url} alt="" style={{width:48,height:48,objectFit:"cover",borderRadius:8,border:"1px solid #f0e0c8"}}/>
                            <button onClick={(ev) => { ev.stopPropagation(); setShopImages(p => p.filter((_,j) => j!==i)); }}
                              style={{position:"absolute",top:-4,right:-4,background:"#fff",border:"1px solid #ddd",borderRadius:8,width:16,height:16,fontSize:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#c0392b"}}>✕</button>
                          </div>
                        ))}
                        <div style={{width:48,height:48,border:"1.5px dashed #e8c8a8",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:"#d67850"}}>+</div>
                      </div>
                      <div style={{fontSize:10,color:"#8a7563",marginTop:4,textAlign:"center"}}>{shopImages.length}枚</div>
                    </div>
                  : <div style={{...S.uploadInner,padding:12,flexDirection:"column",gap:4}}>
                      <div style={{fontSize:22}}>📄</div>
                      <div style={{color:"#e08c3a",fontSize:12,fontWeight:600}}>チラシを撮る（複数OK）</div>
                    </div>
                }
              </div>
              <input ref={shopRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={async e => { const files=Array.from(e.target.files); if(!files.length) return; e.target.value=""; const imgs=await Promise.all(files.map(async f=>({url:URL.createObjectURL(f),b64:await toBase64(f)}))); setShopImages(prev=>[...prev,...imgs]); }}/>

                <DebouncedInput multiline rows={3} style={{...S.warmTextarea,marginBottom:0,border:"none",background:"transparent",height:"100%",fontSize:12,padding:10}} placeholder={"値引き情報を入力\n例：鶏もも半額"} value={shopText} onSave={setShopText}/>

            {appMode==="daily" && (
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:"#b89f87",marginBottom:6,letterSpacing:"0.1em"}}>いつの献立？</div>
                <div style={{display:"flex",gap:8}}>
                  {[{key:"breakfast",icon:"🌅",label:"朝"},{key:"lunch",icon:"☀️",label:"昼"},{key:"dinner",icon:"🌙",label:"夜"}].map(m => {

            <button style={{...S.mainBtn,background:"#f0ebe3",color:"#c0392b",marginTop:8}} onClick={() => { setInvRaw([]); setScreen("update"); }}>

          <div style={{width:"100%",maxWidth:480,background:"#fffcf7",borderRadius:"28px 28px 0 0",padding:"24px 22px 110px",maxHeight:"80vh",overflowY:"auto"}} onClick={e => e.stopPropagation()}>

              <>

                  <div style={{color:"#8a7563",fontSize:13,textAlign:"center",padding:"12px 0 8px",lineHeight:1.7}}>

                            style={{background:"#fff",border:"1.5px dashed #f0d8b8",borderRadius:20,padding:"5px 12px",fontSize:12,color:"#888",cursor:"pointer",fontFamily:"inherit"}}>

            />
            {redeemError && <div style={{color:"#c0392b",fontSize:12,marginBottom:10,textAlign:"center"}}>{redeemError}</div>}
            <div style={{fontSize:11,color:"#c0392b",lineHeight:1.6,background:"#fff5f5",padding:"10px 12px",borderRadius:8,marginBottom:14}}>
              ⚠️ この端末の現在のデータ（在庫・ポイント）は消えて、引き継ぎ先のデータに置き換わります。
            </div>
            <button
              onClick={handleRedeemCode}
              disabled={redeeming}
              style={{...S.mainBtn,background:redeeming?"#ddd":"#e08c3a",color:"#fff",width:"100%",marginBottom:8}}>
              {redeeming ? "引き継ぎ中..." : "引き継ぐ"}
            </button>
            <button
              onClick={() => setTransferModal(null)}
              disabled={redeeming}
              style={{width:"100%",background:"none",border:"none",color:"#888",fontSize:13,padding:"8px 0 0",cursor:"pointer",fontFamily:"inherit"}}>
              キャンセル
            </button>
          </div>
        </div>
      )}
      {pwaModal && (() => {
        const ua = navigator.userAgent;
        const isIOS = /iP(hone|ad|od)/.test(ua);
        const isAndroid = /Android/.test(ua);
        return (
          <div style={{position:"fixed",inset:0,background:"rgba(90,74,58,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:250,padding:20}} onClick={() => setPwaModal(false)}>
            <div style={{width:"100%",maxWidth:400,background:"#fffcf7",borderRadius:24,padding:"24px 22px"}} onClick={e => e.stopPropagation()}>
              <div style={{fontSize:17,fontWeight:700,color:"#5a4a3a",marginBottom:14}}>📲 ホーム画面に追加</div>
              {isIOS ? (
                <div style={{fontSize:13,color:"#5a4a3a",lineHeight:2}}>
                  <div style={{marginBottom:8}}><b>Safari</b> で開いてね</div>
                  <div>① 画面下の <span style={{fontSize:16}}>⬆️</span> <b>共有ボタン</b>をタップ</div>
                  <div>② 下にスクロールして<b>「ホーム画面に追加」</b>をタップ</div>
                  <div>③ <b>「追加」</b>をタップで完了！</div>
                </div>
              ) : isAndroid ? (
                <div style={{fontSize:13,color:"#5a4a3a",lineHeight:2}}>
                  <div style={{marginBottom:8}}><b>Chrome</b> で開いてね</div>
                  <div>① 右上の <b>︙</b>（メニュー）をタップ</div>
                  <div>② <b>「ホーム画面に追加」</b>をタップ</div>
                  <div>③ <b>「追加」</b>をタップで完了！</div>
                </div>
              ) : (
                <div style={{fontSize:13,color:"#5a4a3a",lineHeight:2}}>
                  ブラウザのメニューから<b>「ホーム画面に追加」</b>または<b>「アプリとしてインストール」</b>を選んでね
                </div>
              )}
              <div style={{fontSize:12,color:"#8a7563",marginTop:14,lineHeight:1.7,background:"#fdf6e8",borderRadius:12,padding:"10px 14px"}}>
                アプリみたいにサクサク使えて、アドレスバーも消えるよ！
              </div>
              <button onClick={() => setPwaModal(false)}
                style={{width:"100%",background:"none",border:"none",color:"#888",fontSize:13,padding:"14px 0 0",cursor:"pointer",fontFamily:"inherit"}}>
                閉じる
              </button>
            </div>
          </div>
        );
      })()}
      {pwaBanner && (
        <div style={{position:"fixed",bottom:70,left:12,right:12,zIndex:150,background:"#fffcf7",border:"1.5px solid #f0e0c8",borderRadius:16,padding:"12px 16px",boxShadow:"0 4px 16px rgba(160,120,80,0.15)",display:"flex",alignItems:"center",gap:10}} className="fade-in">
          <span style={{fontSize:15,flexShrink:0}}>📲</span>
          <span style={{flex:1,fontSize:12,color:"#5a4a3a",lineHeight:1.5,cursor:"pointer"}} onClick={() => { setPwaBanner(false); setPwaModal(true); }}>
            <b>ホーム画面に追加</b>するとアプリみたいに使えるよ
          </span>
          <button onClick={() => { setPwaBanner(false); localStorage.setItem("repi_pwa_banner_dismissed","1"); }}
            style={{background:"none",border:"none",color:"#b89f87",fontSize:16,cursor:"pointer",flexShrink:0,padding:4}}>✕</button>
        </div>
      )}
      <TabBar/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
